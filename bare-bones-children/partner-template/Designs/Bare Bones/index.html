  /* ── SBT Panel (Page 6) ─────────────────────────────────────────── */
  .sbt-status-banner {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
  }
  .sbt-status-banner[data-status="active"] {
    background: color-mix(in oklab, var(--success) 8%, transparent);
    border-color: color-mix(in oklab, var(--success) 30%, var(--line));
    color: var(--success);
  }
  .sbt-status-banner[data-status="suspended"] {
    background: color-mix(in oklab, var(--warn) 8%, transparent);
    border-color: color-mix(in oklab, var(--warn) 30%, var(--line));
    color: var(--warn);
  }
  .sbt-status-banner[data-status="revoked"] {
    background: color-mix(in oklab, var(--error) 8%, transparent);
    border-color: color-mix(in oklab, var(--error) 30%, var(--line));
    color: var(--error);
  }
  .sbt-status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 0 3px color-mix(in oklab, currentColor 25%, transparent);
  }

  .sbt-banner {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 12.5px; line-height: 1.5;
  }
  .sbt-banner-warn {
    background: color-mix(in oklab, var(--warn) 6%, var(--bg));
    border: 1px solid color-mix(in oklab, var(--warn) 30%, var(--line));
  }
  .sbt-banner-warn > svg { color: var(--warn); flex-shrink: 0; margin-top: 1px; }
  .sbt-banner-error {
    background: color-mix(in oklab, var(--error) 6%, var(--bg));
    border: 1px solid color-mix(in oklab, var(--error) 30%, var(--line));
  }
  .sbt-banner-error > svg { color: var(--error); flex-shrink: 0; margin-top: 1px; }

  /* Token + metadata grid */
  .sbt-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    margin-bottom: 18px;
  }
  @media (max-width: 880px) { .sbt-grid { grid-template-columns: 1fr; } }

  /* Token card visual */
  .sbt-token-card {
    --token-hue: 220;
    position: relative;
    aspect-ratio: 1 / 1.35;
    background: linear-gradient(155deg,
      oklch(0.18 0.04 var(--token-hue)) 0%,
      oklch(0.12 0.03 var(--token-hue)) 40%,
      oklch(0.09 0.02 var(--token-hue)) 100%);
    border-radius: 14px;
    padding: 16px 16px 18px;
    overflow: hidden;
    display: flex; flex-direction: column;
    border: 1px solid color-mix(in oklab, oklch(0.5 0.15 var(--token-hue)) 30%, var(--line));
    box-shadow: 0 12px 32px -16px color-mix(in oklab, oklch(0.5 0.15 var(--token-hue)) 50%, transparent);
  }
  .sbt-token-card::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at top right, color-mix(in oklab, oklch(0.7 0.18 var(--token-hue)) 22%, transparent), transparent 60%),
      repeating-linear-gradient(45deg, transparent 0 12px, color-mix(in oklab, oklch(0.6 0.15 var(--token-hue)) 6%, transparent) 12px 13px);
    pointer-events: none;
  }
  .sbt-token-suspended { filter: saturate(0.4) brightness(0.85); }
  .sbt-token-revoked { filter: saturate(0.2) brightness(0.6); }

  .sbt-token-corner {
    position: absolute; width: 14px; height: 14px;
    border-color: color-mix(in oklab, oklch(0.7 0.18 var(--token-hue)) 60%, transparent);
    border-style: solid; border-width: 0;
  }
  .sbt-token-corner-tl { top: 6px; left: 6px; border-top-width: 1px; border-left-width: 1px; }
  .sbt-token-corner-tr { top: 6px; right: 6px; border-top-width: 1px; border-right-width: 1px; }
  .sbt-token-corner-bl { bottom: 6px; left: 6px; border-bottom-width: 1px; border-left-width: 1px; }
  .sbt-token-corner-br { bottom: 6px; right: 6px; border-bottom-width: 1px; border-right-width: 1px; }

  .sbt-token-head {
    position: relative; z-index: 1;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 9.5px;
    color: color-mix(in oklab, oklch(0.85 0.1 var(--token-hue)) 80%, white);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .sbt-token-id { color: color-mix(in oklab, oklch(0.9 0.05 var(--token-hue)) 90%, white); }
  .sbt-token-glyph {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 6px;
    margin: 4px 0;
  }
  .sbt-token-foot {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    gap: 2px;
  }
  .sbt-token-name {
    font-size: 14px; font-weight: 500;
    color: color-mix(in oklab, oklch(0.95 0.05 var(--token-hue)) 90%, white);
  }
  .sbt-token-sub {
    font-size: 10px;
    color: color-mix(in oklab, oklch(0.8 0.08 var(--token-hue)) 80%, white);
  }
  .sbt-token-band {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed color-mix(in oklab, oklch(0.6 0.1 var(--token-hue)) 40%, transparent);
    font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: color-mix(in oklab, oklch(0.7 0.1 var(--token-hue)) 70%, white);
  }

  /* Metadata card next to token */
  .sbt-meta-card {
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; flex-direction: column;
  }
  .sbt-meta-table {
    margin-top: 10px;
    flex: 1;
    display: flex; flex-direction: column;
  }
  .sbt-meta-row {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 12px;
    align-items: baseline;
  }
  .sbt-meta-row:last-of-type { border-bottom: 0; }
  .sbt-meta-label { color: var(--text-mute); font-size: 11px; }
  .sbt-meta-val { color: var(--text); word-break: break-all; }
  .sbt-uri { font-size: 11px; color: var(--text-dim); }
  .sbt-actions {
    display: flex; gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  /* Transfer-block proof */
  .sbt-block-proof {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    margin-bottom: 18px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .sbt-block-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .sbt-block-body { min-width: 0; }
  .sbt-block-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .sbt-block-desc {
    margin-top: 4px;
    font-size: 12px; color: var(--text-dim); line-height: 1.5;
    text-wrap: pretty;
  }
  .sbt-block-code {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 10.5px;
    line-height: 1.65;
    color: var(--text);
    white-space: nowrap;
    max-width: 360px;
    overflow-x: auto;
  }
  @media (max-width: 1100px) {
    .sbt-block-proof { grid-template-columns: auto 1fr; }
    .sbt-block-code { grid-column: 1 / -1; max-width: none; }
  }

  /* Generic block (attestations / bindings / lifecycle) */
  .sbt-block {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    background: var(--bg-elev-2);
  }
  .sbt-block-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }
  .sbt-block-subtitle {
    margin-top: 4px;
    font-size: 12px; color: var(--text-dim);
    line-height: 1.5;
  }

  /* Attestation rows */
  .sbt-att-list { display: flex; flex-direction: column; gap: 10px; }
  .sbt-att {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .sbt-att-head {
    display: flex; align-items: center; gap: 10px;
  }
  .sbt-att-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: color-mix(in oklab, var(--success) 14%, transparent);
    color: var(--success);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sbt-att-title-block { flex: 1; min-width: 0; }
  .sbt-att-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .sbt-att-meta { font-size: 11px; color: var(--text-mute); margin-top: 1px; }
  .sbt-att-state {
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.05em;
    font-family: var(--font-mono);
  }
  .sbt-att-valid {
    background: color-mix(in oklab, var(--success) 14%, transparent);
    color: var(--success);
  }
  .sbt-att-pending {
    background: color-mix(in oklab, var(--warn) 14%, transparent);
    color: var(--warn);
  }
  .sbt-att-revoked {
    background: color-mix(in oklab, var(--error) 14%, transparent);
    color: var(--error);
  }
  .sbt-att-fields {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 6px 12px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .sbt-att-field {
    display: flex; gap: 8px;
    font-size: 11px;
  }
  .sbt-att-field-key {
    color: var(--text-mute);
    min-width: 88px;
  }
  .sbt-att-field-val { color: var(--text-dim); word-break: break-all; }
  .sbt-att-sig {
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--text-mute);
    word-break: break-all;
  }

  /* Role bindings */
  .sbt-binding-list { display: flex; flex-direction: column; gap: 6px; }
  .sbt-binding-row {
    display: grid;
    grid-template-columns: 200px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .sbt-binding-hash {
    font-size: 11px;
    color: var(--accent);
  }
  .sbt-binding-tx {
    font-size: 11px;
    color: var(--text-mute);
  }
  @media (max-width: 880px) {
    .sbt-binding-row { grid-template-columns: 1fr; }
  }

  /* Lifecycle timeline */
  .sbt-lifecycle {
    display: flex; flex-direction: column;
    position: relative;
  }
  .sbt-lifecycle::before {
    content: '';
    position: absolute;
    left: 6px; top: 14px; bottom: 14px;
    width: 1px;
    background: var(--line);
  }
  .sbt-lc-row {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 0;
    position: relative;
  }
  .sbt-lc-dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--bg-elev-2);
    border: 2px solid var(--text-mute);
    flex-shrink: 0;
    z-index: 1;
  }
  .sbt-lc-mint { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 30%, var(--bg-elev-2)); }
  .sbt-lc-attest { border-color: var(--success); background: color-mix(in oklab, var(--success) 30%, var(--bg-elev-2)); }
  .sbt-lc-bind { border-color: var(--text-dim); background: color-mix(in oklab, var(--text-dim) 30%, var(--bg-elev-2)); }
  .sbt-lc-suspend { border-color: var(--warn); background: color-mix(in oklab, var(--warn) 30%, var(--bg-elev-2)); }
  .sbt-lc-burn { border-color: var(--error); background: color-mix(in oklab, var(--error) 30%, var(--bg-elev-2)); }
  .sbt-lc-body { flex: 1; min-width: 0; }
  .sbt-lc-event { font-size: 13px; color: var(--text); }
  .sbt-lc-meta { font-size: 11px; color: var(--text-mute); margin-top: 2px; }
  .sbt-lc-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.06em;
    background: var(--bg-elev-2);
    color: var(--text-mute);
  }
  .sbt-lc-tag-mint { background: color-mix(in oklab, var(--accent) 14%, transparent); color: var(--accent); }
  .sbt-lc-tag-attest { background: color-mix(in oklab, var(--success) 14%, transparent); color: var(--success); }
  .sbt-lc-tag-suspend { background: color-mix(in oklab, var(--warn) 14%, transparent); color: var(--warn); }
  .sbt-lc-tag-burn { background: color-mix(in oklab, var(--error) 14%, transparent); color: var(--error); }

  /* Danger zone */
  .sbt-danger {
    margin-top: 14px;
    padding: 14px 16px;
    border: 1px solid color-mix(in oklab, var(--error) 30%, var(--line));
    background: color-mix(in oklab, var(--error) 4%, var(--bg-elev-2));
    border-radius: 10px;
    display: flex; gap: 16px; align-items: center; justify-content: space-between;
  }
  .btn-danger {
    background: color-mix(in oklab, var(--error) 14%, transparent);
    border: 1px solid color-mix(in oklab, var(--error) 40%, var(--line));
    color: var(--error);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 12.5px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .btn-danger:hover {
    background: color-mix(in oklab, var(--error) 22%, transparent);
    border-color: var(--error);
  }

  /* Pending state */
  .sbt-pending-card {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 32px;
    padding: 24px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    align-items: center;
  }
  .sbt-pending-illo {
    display: flex; align-items: center; justify-content: center;
  }
  .sbt-pending-token {
    width: 140px; height: 190px;
    border-radius: 12px;
    border: 2px dashed var(--line);
    background:
      repeating-linear-gradient(45deg,
        var(--bg) 0 8px,
        var(--bg-elev) 8px 9px);
    display: flex; align-items: center; justify-content: center;
  }
  .sbt-pending-token-inner {
    text-align: center;
    color: var(--text-mute);
  }
  .sbt-pending-flow {
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .sbt-pending-step {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    align-items: flex-start;
    opacity: 0.6;
  }
  .sbt-pending-step.active { opacity: 1; }
  .sbt-pending-step.done { opacity: 1; }
  .sbt-pending-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-mute);
  }
  .sbt-pending-step.active .sbt-pending-num {
    border-color: var(--warn);
    color: var(--warn);
    background: color-mix(in oklab, var(--warn) 12%, transparent);
  }
  .sbt-pending-step.done .sbt-pending-num {
    border-color: var(--success);
    color: var(--success);
    background: color-mix(in oklab, var(--success) 12%, transparent);
  }
  .sbt-pending-label {
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .sbt-pending-desc {
    font-size: 12px; color: var(--text-dim); margin-top: 2px;
    line-height: 1.5;
  }
  @media (max-width: 880px) {
    .sbt-pending-card { grid-template-columns: 1fr; }
  }

  /* Stub cards (will be replaced when subsequent pages ship) */
  .m-stub-card, .m-detail-stub {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    padding: 24px;
    margin-top: 12px;
  }
  .m-stub-note {
    margin-top: 18px;
    padding: 12px 14px;
    border: 1px dashed var(--line);
    border-radius: 8px;
    color: var(--text-mute);
    font-size: 13px;
  }

  .m-modal-back {
    position: fixed; inset: 0; z-index: 80;
    background: color-mix(in oklab, #000 60%, transparent);
    backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .m-modal-shell {
    width: 100%; max-width: 580px;
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6);
  }
  .m-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }

  /* Roles page */
  .m-roles-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    align-items: start;
  }
  .m-roles-list {
    display: flex; flex-direction: column; gap: 6px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    padding: 6px;
    max-height: 70vh; overflow: auto;
  }
  .m-role-item {
    text-align: left;
    padding: 11px 12px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    cursor: pointer;
    color: var(--text);
    display: flex; flex-direction: column; gap: 4px;
  }
  .m-role-item:hover { background: var(--bg); }
  .m-role-item.on {
    background: var(--bg);
    border-color: var(--line-strong);
  }
  .m-role-item-top {
    display: flex; align-items: center; gap: 8px;
  }
  .m-role-item-name { font-weight: 600; font-size: 13.5px; }
  .m-role-default {
    font-size: 9.5px; padding: 1px 5px; border-radius: 4px;
    background: color-mix(in oklab, var(--success) 14%, transparent);
    color: var(--success); text-transform: uppercase; letter-spacing: .08em;
  }
  .m-role-custom {
    font-size: 9.5px; padding: 1px 5px; border-radius: 4px;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    color: var(--accent); text-transform: uppercase; letter-spacing: .08em;
  }
  .m-role-item-desc {
    font-size: 11.5px; color: var(--text-dim); line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .m-role-item-meta {
    font-size: 10.5px; color: var(--text-mute);
    display: flex; gap: 4px; align-items: center; flex-wrap: wrap;
  }
  .m-role-item-meta .dot { color: var(--line-strong); }

  .m-role-detail {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    padding: 22px;
    min-height: 420px;
  }
  .m-role-detail-empty {
    height: 100%; min-height: 360px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    color: var(--text-mute);
    text-align: center;
  }
  .m-role-detail-head {
    display: flex; align-items: flex-start; gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .m-role-detail-head > div:first-child { flex: 1; min-width: 200px; }
  .m-role-detail-title {
    margin: 4px 0 4px;
    font-family: var(--font-display);
    font-size: 24px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--text);
  }
  .m-role-detail-desc {
    margin: 0; color: var(--text-dim); font-size: 13px; max-width: 60ch;
  }
  .m-role-detail-actions { display: flex; gap: 6px; }
  .btn-ghost.btn-sm.danger { color: var(--error); }
  .btn-ghost.btn-sm.danger:hover {
    background: color-mix(in oklab, var(--error) 12%, transparent);
    border-color: color-mix(in oklab, var(--error) 35%, var(--line));
  }

  .m-role-meta-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 12px;
  }
  .m-meta {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
  }
  .m-meta-val { margin-top: 4px; }
  .m-meta-num {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 500;
    color: var(--text);
  }

  .amw-perm-sigreq {
    margin-left: auto;
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 4px;
    background: color-mix(in oklab, var(--warn) 14%, transparent);
    color: var(--warn);
    align-self: center;
    white-space: nowrap;
  }

  .m-role-members {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .m-role-member-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 9px 4px 4px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text);
  }

  /* Role builder */
  .rb-acct-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .rb-acct {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: pointer; text-align: left;
    color: var(--text-dim);
  }
  .rb-acct:hover { border-color: var(--line-strong); color: var(--text); }
  .rb-acct.on {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 7%, var(--bg-elev));
    color: var(--text);
  }

  .rb-check {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid var(--line-strong);
    color: transparent;
    flex-shrink: 0;
  }
  .rb-acct.on .rb-check, .rb-perm.on .rb-check {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  .rb-perms {
    display: flex; flex-direction: column; gap: 6px;
  }
  .rb-perm {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;

  /* Permissions page */
  .pm-banner {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;

    border-radius: 12px;
  }
  .pm-banner-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: color-mix(in oklab, var(--accent) 18%, transparent);
    color: var(--accent);
    flex-shrink: 0;
  }
  .pm-banner-title { font-weight: 600; font-size: 13.5px; color: var(--text); }

  .pm-sig-mini {

    grid-template-columns: 1fr auto 1fr auto;

    padding: 10px 12px;

    border: 1px solid var(--line);
    border-radius: 8px;

  .pm-c-param { font-size: 12.5px; color: var(--accent); font-weight: 500; }
  .pm-c-op {

  }
  .pm-c-val { font-size: 12.5px; color: var(--text); }
  .pm-c-type {
    font-size: 10.5px;
    padding: 2px 7px;

    display: flex; flex-direction: column; gap: 6px; margin-top: 8px;

    display: grid;
    grid-template-columns: 1fr 140px 1fr 110px auto;

    align-items: center;

    .pm-auth-grid { grid-template-columns: 1fr; }

  /* Add Member wizard */
  .amw-shell { max-width: 720px; }
  .amw-title-thin {
    font-family: var(--font-display); font-size: 16px; font-weight: 500;
    margin-top: 2px; color: var(--text);
  }
  .amw-steps {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    background: color-mix(in oklab, var(--bg) 60%, transparent);
  }
  .amw-step {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-mute); font-size: 12.5px;
  }
  .amw-step.active { color: var(--text); }
  .amw-step.done { color: var(--success); }
  .amw-step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--line-strong);
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    background: var(--bg-elev);
  }
  .amw-step.active .amw-step-num {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in oklab, var(--accent) 10%, transparent);
  }
  .amw-step.done .amw-step-num {
    border-color: var(--success);
    background: color-mix(in oklab, var(--success) 14%, transparent);
    color: var(--success);
  }
  .amw-step-line {
    flex: 1; height: 1px; background: var(--line); min-width: 18px;
  }
  .amw-step-line.done { background: var(--success); opacity: .55; }

  .amw-body {
    padding: 22px;
    max-height: 56vh; overflow: auto;
  }
  .amw-kicker {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-mute);
  }
  .amw-title {
    font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em;
    font-size: 22px; margin: 6px 0 4px; color: var(--text);
  }
  .amw-sub { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; max-width: 60ch; }
  .amw-section-head {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-mute);
    margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px dashed var(--line);
  }

  /* Account type cards */
  .amw-acct-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .amw-acct-card {
    position: relative; text-align: left;
    padding: 16px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    cursor: pointer; transition: border-color .15s, transform .15s, background .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .amw-acct-card:hover { border-color: var(--line-strong); }
  .amw-acct-card.selected {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 7%, var(--bg-elev));
  }
  .amw-acct-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    color: var(--accent);
    margin-bottom: 4px;
  }
  .amw-acct-name { font-weight: 600; font-size: 14px; color: var(--text); }
  .amw-acct-sub { font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .1em; }
  .amw-acct-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; flex: 1; }
  .amw-acct-meta { font-size: 10.5px; color: var(--text-mute); margin-top: 6px; }
  .amw-acct-check {
    position: absolute; top: 10px; right: 10px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Identity step */
  .amw-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .amw-grid .field.full { grid-column: 1 / -1; }
  .amw-grid .field { display: flex; flex-direction: column; gap: 5px; }
  .amw-grid .field label {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-mute);
  }
  .amw-body .field {
    display: flex; flex-direction: column; gap: 5px;
  }
  .amw-body .field label {
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-mute);
  }
  .amw-body .input {
    width: 100%; padding: 9px 11px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px; font-family: inherit;

  .amw-body .input.mono { font-family: var(--font-mono); font-size: 12px; }
  .amw-body .input:focus { outline: none; border-color: var(--accent); }

  .amw-wallet-toggle {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .amw-wt {
    display: flex; align-items: flex-start; gap: 10px; text-align: left;
    padding: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px; cursor: pointer;

  .amw-kyc-hint { display: block; font-size: 11.5px; color: var(--text-mute); margin-top: 3px; }

  /* Roles step */
  .amw-roles {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .amw-role-card {
    position: relative; text-align: left;
    padding: 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px; cursor: pointer;
  }
  .amw-role-card:hover { border-color: var(--line-strong); }
  .amw-role-card.on {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 7%, var(--bg-elev));

    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;

  .amw-role-name { font-weight: 600; font-size: 13.5px; color: var(--text); }

  .amw-role-check {
    position: absolute; top: 10px; right: 10px;
    width: 16px; height: 16px; border-radius: 50%;
    border: 1px solid var(--line-strong);
    display: inline-flex; align-items: center; justify-content: center;
    color: transparent;
  }
  .amw-role-card.on .amw-role-check {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  .amw-empty {
    padding: 18px; text-align: center; color: var(--text-mute);
    border: 1px dashed var(--line); border-radius: 10px; font-size: 12px;
  }

  .amw-perm-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .amw-perm-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 11px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--accent);
  }
  .amw-perm-row > div { color: var(--text); flex: 1; }
  .amw-perm-name { font-size: 13px; font-weight: 500; }
  .amw-perm-sub { font-size: 11px; color: var(--text-mute); margin-top: 1px; }

  .amw-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    background: color-mix(in oklab, var(--bg) 60%, transparent);
  }
  .amw-foot-hint {
    font-size: 11px; color: var(--text-mute);
  }

  @media (max-width: 720px) {
    .amw-acct-grid { grid-template-columns: 1fr; }
    .amw-grid { grid-template-columns: 1fr; }
    .amw-wallet-toggle { grid-template-columns: 1fr; }

  /* ============================================================
     Mobile preview frame (driven by Tweaks)

  body.mobile-preview {
    background: #1a1a1d;

  body.mobile-preview #root {
