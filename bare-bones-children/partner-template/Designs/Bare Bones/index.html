<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bare Bones — The bare bones of a real DAO</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --radius: 10px;
    --bg: #0c0c0d;
    --bg-elev: #141416;
    --bg-elev-2: #1a1a1d;
    --line: #24242a;
    --line-strong: #33333a;
    --text: #ededee;
    --text-dim: #a3a3aa;
    --text-mute: #6b6b74;
    --accent: oklch(0.78 0.14 148);
    --accent-ink: #0a1a0f;
    --accent-soft: oklch(0.32 0.06 148);
    --success: oklch(0.78 0.14 148);
    --warn: oklch(0.82 0.14 78);
    --error: oklch(0.70 0.17 25);
    --info: oklch(0.75 0.10 240);
    --font-ui: "Inter Tight", -apple-system, Segoe UI, sans-serif;
    --font-display: "Inter Tight", -apple-system, Segoe UI, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --display-weight: 600;
    --display-italic: normal;
    --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -12px rgba(0,0,0,.5);
    --density: 1;
  }
  html[data-theme="light"] {
    --bg: #ebe9e2;
    --bg-elev: #f7f5f0;
    --bg-elev-2: #ffffff;
    --line: #c9c6bc;
    --line-strong: #a8a59a;
    --text: #0e0e10;
    --text-dim: #46464c;
    --text-mute: #6f6f78;
    --accent: oklch(0.55 0.16 148);
    --accent-ink: #ffffff;
    --accent-soft: oklch(0.88 0.06 148);
    --shadow: 0 1px 0 rgba(0,0,0,.03) inset, 0 8px 22px -12px rgba(20,20,30,.18);
  }

  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
  }
  /* Honeycomb canvas sits behind content via fixed + z:-1; body bg is transparent when it's active */
  body.has-bg { background: transparent; }

  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; border: 0; background: none; }
  a { color: inherit; text-decoration: none; }

  .mono { font-family: var(--font-mono); font-feature-settings: "zero"; }
  .serif { font-family: var(--font-display); font-weight: var(--display-weight); font-style: var(--display-italic); letter-spacing: -0.01em; }

  /* Headings use the display font + its configured weight/italic */
  .hero h1, .section-head h2, .gov-hero h1,
  .step-title, .prop-main h3, .cfg-v, .create-card h3,
  .modal-head h3, .stat-v, .wallet-bal-v, .empty h4 {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    font-style: var(--display-italic);
  }
  .hero h1 em, .section-head h2 em { font-style: italic; }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* --- layout --- */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }
  @media (max-width: 640px) { .container { padding: 0 16px; } }

  /* --- nav --- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 40;
    backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--bg) 82%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 60px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: -0.01em;
    padding-right: 8px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    border: 1.5px solid var(--text);
    border-radius: 50%;
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .brand em { font-style: italic; color: var(--text-dim); font-weight: 400; }

  .nav-links {
    display: flex; gap: 4px;
    margin-left: 16px;
  }
  .nav-link {
    padding: 7px 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-radius: 8px;
    transition: color .15s, background .15s;
  }
  .nav-link:hover { color: var(--text); background: var(--bg-elev); }
  .nav-link.active { color: var(--text); background: var(--bg-elev); }

  .nav-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }

  /* icon button */
  .icon-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .icon-btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* chain selector */
  .chain-sel {
    display: inline-flex; align-items: center; gap: 8px;
    height: 36px;
    padding: 0 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px; font-weight: 500;
  }
  .chain-sel:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .chain-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot, #888); flex-shrink: 0; }
  .chain-caret { color: var(--text-mute); }
  .chain-label-short { display: none; }

  /* DAO switcher */
  .dao-sel {
    display: inline-flex; align-items: center; gap: 8px;
    height: 36px;
    padding: 0 10px 0 6px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px; font-weight: 500;
    max-width: 220px;
  }
  .dao-sel:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .dao-sel-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dao-sel-short { display: none; }
  .dao-avatar {
    display: inline-flex; align-items: center; justify-content: center;
    color: white; font-weight: 600;
    font-family: var(--font-display);
    flex-shrink: 0;
    line-height: 1;
  }
  .dao-menu { min-width: 280px; padding: 6px; }
  .dao-item { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; padding: 10px 10px; }
  .dao-item-k { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .dao-item-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .dao-item-sub { font-size: 11.5px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dao-item.checked .check { opacity: 1; color: var(--accent); }
  .dao-item .check { opacity: 0; }
  .dao-create-item {
    display: grid; grid-template-columns: auto 1fr; gap: 12px; align-items: center; padding: 10px;
    color: var(--text);
  }
  .dao-create-icon {
    width: 26px; height: 26px; border-radius: 6px;
    background: color-mix(in oklab, var(--accent) 18%, var(--bg-elev));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
  }
  @media (max-width: 880px) {
    .dao-sel-label { display: none; }
    .dao-sel-short { display: inline-flex; }
    .dao-sel { padding: 0 8px; }
  }
  @media (max-width: 540px) {
    .dao-sel { display: none; }
  }

  /* Create DAO modal extras */
  .create-dao-modal { max-width: 640px; }
  .modal-kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10.5px; color: var(--text-mute); margin-bottom: 4px;
  }
  .cd-steps {
    display: flex; align-items: center; gap: 0;
    padding: 14px 22px; border-bottom: 1px solid var(--line);
  }
  .cd-step {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-mute);
    background: transparent; padding: 4px 8px;
    border-radius: 6px;
  }
  .cd-step:hover { color: var(--text-dim); }
  .cd-step.active { color: var(--text); }
  .cd-step.done { color: var(--text-dim); }
  .cd-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg-elev); border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    color: var(--text-mute);
  }
  .cd-step.active .cd-step-num { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .cd-step.done .cd-step-num { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 60%, var(--line)); }
  .cd-step-line { flex: 1; height: 1px; background: var(--line); margin: 0 4px; }
  .cd-step-line.done { background: color-mix(in oklab, var(--accent) 50%, var(--line)); }

  .cd-body { padding: 22px 22px 12px; max-height: 55vh; overflow-y: auto; }
  .cd-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    border-top: 1px solid var(--line);
  }
  .cd-foot-hint { font-size: 12px; color: var(--text-mute); font-family: var(--font-mono); }

  .input-with-unit {
    display: flex; align-items: stretch;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg-elev);
    overflow: hidden;
  }
  .input-with-unit:focus-within { border-color: var(--accent); }
  .input-with-unit .input {
    border: 0; background: transparent; flex: 1; min-width: 0;
    border-radius: 0;
  }
  .input-with-unit .input:focus { outline: none; box-shadow: none; }
  .input-unit {
    display: inline-flex; align-items: center;
    padding: 0 12px;
    border-left: 1px solid var(--line);
    font-size: 12.5px; color: var(--text-mute);
    background: var(--bg);
    font-family: var(--font-mono);
  }
  .field-hint { font-size: 11.5px; color: var(--text-mute); margin-top: 2px; }
  .field-err { font-size: 11.5px; color: var(--error); margin-top: 2px; }
  .input[aria-invalid="true"] { border-color: var(--error); }

  /* roles step */
  .cd-roles { display: flex; flex-direction: column; gap: 16px; }
  .roles-sep { height: 1px; background: var(--line); }
  .roles-hint {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-dim);
    padding: 8px 10px; border-radius: 6px;
    background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev));
  }
  .roles-hint > svg { color: var(--accent); }
  .addr-list { display: flex; flex-direction: column; gap: 8px; }
  .addr-list-head label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .addr-list-sub { font-size: 11.5px; color: var(--text-mute); }
  .addr-list-rows { display: flex; flex-direction: column; gap: 6px; }
  .addr-list-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; }
  .addr-list-del {
    width: 32px; height: 32px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--bg-elev); color: var(--text-mute);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .addr-list-del:hover:not(:disabled) { color: var(--error); border-color: color-mix(in oklab, var(--error) 35%, var(--line)); }
  .addr-list-del:disabled { opacity: .4; cursor: not-allowed; }
  .addr-list-add {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .addr-list-add:hover { color: var(--text); border-color: var(--line-strong); }

  /* Token-source tiles */
  .source-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 640px) { .source-tiles { grid-template-columns: 1fr; } }
  .source-tile {
    display: grid; grid-template-columns: auto 1fr; gap: 12px;
    align-items: flex-start;
    padding: 14px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .source-tile:hover { border-color: var(--line-strong); }
  .source-tile.active {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 7%, var(--bg-elev));
  }
  .source-tile-radio {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid var(--line-strong);
    flex-shrink: 0; margin-top: 2px;
    position: relative;
  }
  .source-tile.active .source-tile-radio { border-color: var(--accent); }
  .source-tile.active .source-tile-radio::after {
    content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--accent);
  }
  .source-tile-k { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .source-tile-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .source-tile-sub { font-size: 11.5px; color: var(--text-mute); line-height: 1.45; }

  /* Section block inside step body */
  .cd-section {
    display: flex; flex-direction: column; gap: 12px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: color-mix(in oklab, var(--bg) 35%, var(--bg-elev));
  }
  .cd-section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .cd-section-head h4 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 15px; font-weight: 500; letter-spacing: -0.005em;
  }
  .cd-section-head p { margin: 2px 0 0; font-size: 11.5px; color: var(--text-mute); max-width: 48ch; }
  .cd-section-divider { height: 1px; background: var(--line); margin: 4px -16px; }

  /* Immutable-flag toggle row */
  .flag-row {
    display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center;
    padding: 10px 0;
  }
  .flag-row-k { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .flag-row-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .flag-row-sub { font-size: 11.5px; color: var(--text-mute); line-height: 1.45; max-width: 52ch; }
  .immutable-tag {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 2px 6px;
    border-radius: 4px;
    background: color-mix(in oklab, var(--warn) 14%, var(--bg-elev-2));
    color: var(--warn);
  }
  .toggle {
    --w: 36px;
    --h: 20px;
    width: var(--w); height: var(--h);
    border-radius: 999px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    position: relative;
    flex-shrink: 0;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 1px; left: 1px;
    width: calc(var(--h) - 4px); height: calc(var(--h) - 4px);
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform .15s, background .15s;
  }
  .toggle.on { background: color-mix(in oklab, var(--accent) 35%, var(--bg-elev-2)); border-color: var(--accent); }
  .toggle.on::after { transform: translateX(calc(var(--w) - var(--h))); background: var(--accent); }

  /* Cap table allocation rows */
  .alloc-list { display: flex; flex-direction: column; gap: 8px; }
  .alloc-head {
    display: grid;
    grid-template-columns: 1fr 180px 32px;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 0 2px;
  }
  .alloc-row {
    display: grid;
    grid-template-columns: 1fr 180px 32px;
    gap: 6px;
    align-items: stretch;
  }
  .alloc-row .input-with-unit { background: var(--bg-elev); }
  .alloc-row .input { background: var(--bg-elev); }
  .alloc-total {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 4px 0;
    font-size: 11.5px;
    color: var(--text-mute);
    font-family: var(--font-mono);
  }
  .alloc-total b {
    color: var(--text);
    font-weight: 500;
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: -0.005em;
  }
  @media (max-width: 640px) {
    .alloc-head { grid-template-columns: 1fr 110px 32px; }
    .alloc-row { grid-template-columns: 1fr 110px 32px; }
  }

  /* Status note used by paused / minter hints */
  .cd-note {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    font-size: 12px; color: var(--text-dim);
    line-height: 1.45;
  }
  .cd-note > svg { flex-shrink: 0; color: var(--text-mute); margin-top: 1px; }
  .cd-note b { color: var(--text); font-weight: 500; }
  .cd-note.accent { background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev)); border-color: color-mix(in oklab, var(--accent) 25%, var(--line)); }
  .cd-note.accent > svg { color: var(--accent); }
    padding: 0 10px 0 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: border-color .15s, background .15s;
  }
  .chain-sel:hover { border-color: var(--line-strong); }
  .chain-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dot, var(--accent));
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--dot, var(--accent)) 30%, transparent);
  }
  .chain-caret { opacity: .5; }
  .chain-sel .chain-label-full { display: inline; }
  .chain-sel .chain-label-short { display: none; }
  @media (max-width: 640px) {
    .chain-sel .chain-label-full { display: none; }
    .chain-sel .chain-label-short { display: inline; }
    .chain-sel { padding: 0 8px; }
  }

  /* wallet button */
  .wallet-btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 36px;
    padding: 0 12px 0 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-weight: 500;
    font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  .wallet-btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .wallet-btn.connect { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .wallet-btn.connect:hover { filter: brightness(0.95); }

  .wallet-avatar {
    width: 18px; height: 18px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    flex: none;
  }

  /* --- hero / landing --- */
  .hero {
    padding: 96px 0 72px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 64px;
    align-items: end;
  }
  @media (max-width: 880px) {
    .hero { padding: 56px 0 48px; }
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ""; width: 24px; height: 1px; background: var(--text-mute);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(44px, 7vw, 88px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
  }
  .hero h1 em { color: var(--accent); font-style: italic; }
  .hero-sub {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 52ch;
    margin: 0 0 32px;
    text-wrap: pretty;
  }
  .hero-cta { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-primary, .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    height: 44px;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 14px; font-weight: 500;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-ink);
  }
  .btn-primary:hover { filter: brightness(0.95); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary.btn-sm, .btn-ghost.btn-sm { height: 36px; padding: 0 14px; font-size: 13px; font-weight: 500; }
  .btn-ghost {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }

  .hero-stats {
    border-left: 1px solid var(--line);
    padding-left: 32px;
    display: grid;
    gap: 28px;
  }
  @media (max-width: 880px) {
    .hero-stats { border-left: 0; padding-left: 0; border-top: 1px solid var(--line); padding-top: 32px; }
  }
  .stat-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: baseline; }
  .stat-k { color: var(--text-dim); font-size: 13px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; }
  .stat-v { font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }
  .stat-v small { font-size: 14px; color: var(--text-dim); font-family: var(--font-ui); letter-spacing: 0; margin-left: 4px; }

  /* how it works */
  .section { padding: 80px 0; border-bottom: 1px solid var(--line); }
  @media (max-width: 880px) { .section { padding: 56px 0; } }

  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 40px; flex-wrap: wrap; gap: 12px;
  }
  .section-head h2 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-head h2 em { color: var(--accent); font-style: italic; }
  .section-head .eyebrow { margin: 0; }

  .steps {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .step {
    padding: 32px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .step:last-child { border-right: 0; }
  .step-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: .12em;
    margin-bottom: 32px;
  }
  .step-title {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .step-body { color: var(--text-dim); font-size: 14.5px; text-wrap: pretty; }
  @media (max-width: 880px) {
    .steps { grid-template-columns: 1fr; }
    .step { border-right: 0; border-bottom: 1px solid var(--line); }
    .step:last-child { border-bottom: 0; }
  }

  /* Single-column hero (no stats column) */
  .hero-grid.hero-grid-solo { grid-template-columns: 1fr; gap: 0; }
  .hero-grid.hero-grid-solo > div { max-width: 22ch; }
  .hero-grid.hero-grid-solo h1 { max-width: 18ch; }
  .hero-grid.hero-grid-solo > div { max-width: none; }
  .hero-grid.hero-grid-solo .hero-sub { max-width: 56ch; }

  /* Four-pillar grid on home */
  .pillars {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .pillar {
    text-align: left;
    padding: 28px 26px 24px;
    border-right: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    display: flex; flex-direction: column;
    gap: 0;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .pillar:last-child { border-right: 0; }
  .pillar:hover { background: color-mix(in oklab, var(--accent) 5%, var(--bg-elev)); }
  .pillar:hover .pillar-cta { color: var(--accent); }
  .pillar:hover .pillar-cta svg { transform: translateX(3px); }
  .pillar-icon {
    width: 32px; height: 32px;
    border-radius: 7px;
    background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev-2));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
  }
  .pillar-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: .12em;
    margin-bottom: 10px;
  }
  .pillar-title {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    font-style: var(--display-italic);
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .pillar-body {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
    text-wrap: pretty;
    margin-bottom: 18px;
    flex: 1;
  }
  .pillar-cta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: .08em;
    transition: color .15s;
  }
  .pillar-cta svg { transition: transform .15s; }
  @media (max-width: 1040px) {
    .pillars { grid-template-columns: repeat(2, 1fr); }
    .pillar:nth-child(1), .pillar:nth-child(2) { border-bottom: 1px solid var(--line); }
    .pillar:nth-child(2), .pillar:nth-child(4) { border-right: 0; }
  }
  @media (max-width: 560px) {
    .pillars { grid-template-columns: 1fr; }
    .pillar { border-right: 0; border-bottom: 1px solid var(--line); }
    .pillar:last-child { border-bottom: 0; }
  }

  /* governance page */
  .gov-hero { padding: 48px 0 32px; border-bottom: 1px solid var(--line); }
  .gov-hero-inner {
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  }
  @media (max-width: 640px) { .gov-hero-inner { grid-template-columns: 1fr; } }
  .gov-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 400; letter-spacing: -0.01em;
    margin: 0;
  }
  .gov-hero .crumb {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px;
  }

  .tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    margin-left: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-elev);
  }

  /* Subtabs — secondary nav inside a primary tab (e.g. Proposals) */
  .subtabs {
    display: flex; gap: 4px;
    margin: -8px 0 24px;
    padding: 4px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    width: fit-content;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .subtabs::-webkit-scrollbar { display: none; }
  .subtab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-radius: 7px;
    white-space: nowrap;
    transition: color .15s, background .15s;
  }
  .subtab:hover { color: var(--text); }
  .subtab.active { color: var(--text); background: var(--bg-elev-2); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .subtab .count {
    margin-left: 4px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--bg);
  }
  .subtab.active .count { background: var(--bg-elev); color: var(--text-dim); }

  /* proposal card */
  .prop {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    padding: 20px 24px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    transition: border-color .15s, transform .15s;
    margin-bottom: 10px;
  }
  .prop:hover { border-color: var(--line-strong); }
  @media (max-width: 740px) {
    .prop { grid-template-columns: 1fr; gap: 14px; padding: 18px; }
  }

  .prop-id {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-mute);
    padding-top: 3px;
    min-width: 52px;
  }
  .prop-main h3 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.005em;
    margin: 0 0 6px;
    line-height: 1.2;
  }
  .prop-meta {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-mute);
  }
  .prop-meta .dot { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: .5; }
  .prop-tallies {
    margin-top: 14px;
    display: grid; gap: 6px; max-width: 360px;
  }
  .tally-bar {
    height: 6px; border-radius: 999px; overflow: hidden;
    background: var(--bg-elev-2);
    display: flex;
  }
  .tally-seg { height: 100%; }
  .tally-seg.for { background: var(--success); }
  .tally-seg.against { background: var(--error); }
  .tally-seg.abstain { background: var(--text-mute); }
  .tally-legend {
    display: flex; gap: 16px;
    font-size: 12px; color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .tally-legend b { color: var(--text); font-weight: 500; }

  .prop-side {
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    min-width: 160px;
  }
  .prop-quickactions {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    justify-content: flex-end;
  }
  .quick-hint {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; color: var(--text-dim);
    padding: 5px 9px; border-radius: 6px;
    background: var(--bg-elev);
    font-family: var(--font-mono);
  }
  .quick-hint > svg { color: var(--text-mute); }
  @media (max-width: 740px) {
    .prop-side { align-items: flex-start; min-width: 0; flex-direction: row; flex-wrap: wrap; }
    .prop-quickactions { justify-content: flex-start; }
  }

  .status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    letter-spacing: .02em;
    text-transform: uppercase;
    border: 1px solid var(--line);
    background: var(--bg-elev-2);
    color: var(--text-dim);
  }
  .status::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .status.active { color: var(--success); }
  .status.pending { color: var(--warn); }
  .status.succeeded { color: var(--success); }
  .status.defeated { color: var(--error); }
  .status.executed { color: var(--info); }
  .status.vetoed { color: var(--error); }
  .status.locked { color: var(--warn); }

  /* expand affordance */
  .prop { padding: 0 !important; display: block; }
  .prop-summary {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    padding: 20px 24px;
    cursor: pointer;
    align-items: start;
  }
  .prop-summary:hover { background: color-mix(in oklab, var(--bg-elev-2) 40%, transparent); }
  @media (max-width: 740px) { .prop-summary { grid-template-columns: 1fr; gap: 14px; padding: 18px; } }
  .prop-expand {
    border-top: 1px solid var(--line);
    padding: 18px 24px 20px;
    display: flex; flex-direction: column; gap: 14px;
    animation: expand .2s ease;
  }
  @keyframes expand { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  @media (max-width: 740px) { .prop-expand { padding: 16px 18px; } }
  .prop-desc { margin: 0; color: var(--text-dim); font-size: 14.5px; text-wrap: pretty; }

  .chev-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev-2);
    color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chev-btn:hover { color: var(--text); border-color: var(--line-strong); }

  /* actions */
  .actions-box {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: color-mix(in oklab, var(--bg) 60%, var(--bg-elev-2));
    overflow: hidden;
  }
  .actions-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  .actions-title {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .actions-title .count {
    margin-left: 8px;
    font-size: 11px; color: var(--text); padding: 2px 7px;
    background: var(--bg-elev); border-radius: 4px;
  }
  .toggle-seg {
    display: inline-flex; border: 1px solid var(--line); border-radius: 7px; padding: 2px; gap: 2px;
    background: var(--bg-elev);
  }
  .toggle-seg button {
    padding: 4px 10px; font-size: 12px; font-weight: 500; color: var(--text-dim);
    border-radius: 5px;
  }
  .toggle-seg button.on { background: var(--bg-elev-2); color: var(--text); }

  .action-fmt {
    display: grid; grid-template-columns: auto 1fr; gap: 14px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
  }
  .action-fmt:last-child { border-bottom: 0; }
  .action-idx {
    width: 22px; height: 22px; border-radius: 4px;
    background: var(--bg-elev); color: var(--text-mute);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .action-call { font-size: 13.5px; line-height: 1.4; word-break: break-all; }
  .action-contract { color: var(--accent); }
  .action-dot, .action-parens, .action-comma { color: var(--text-mute); }
  .action-fn { color: var(--text); font-weight: 500; }
  .action-arg { color: var(--text); }
  .action-meta {
    margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-mute);
  }
  .action-meta .dot { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: .5; }

  .raw-table-wrap { overflow-x: auto; }
  .raw-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .raw-table th {
    text-align: left; font-weight: 500;
    color: var(--text-mute); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    padding: 10px 12px; border-bottom: 1px solid var(--line);
  }
  .raw-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--line);
    color: var(--text); vertical-align: middle;
    white-space: nowrap;
  }
  .raw-table td .copy-btn { vertical-align: middle; margin-left: 6px; }
  .raw-table tr:last-child td { border-bottom: 0; }
  .raw-table .dim { color: var(--text-mute); }
  @media (max-width: 640px) {
    .raw-table th, .raw-table td { padding: 8px 10px; font-size: 11.5px; }
  }

  /* Admin / lifecycle button row */
  .prop-admin {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    justify-content: flex-end;
    padding-top: 4px;
  }
  .prop-admin .admin-hint { margin-right: auto; }
  .btn-ghost.danger {
    color: var(--error);
    border-color: color-mix(in oklab, var(--error) 35%, var(--line));
    height: 36px; padding: 0 14px; font-size: 13px;
  }
  .btn-ghost.danger:hover { background: color-mix(in oklab, var(--error) 10%, var(--bg-elev-2)); }

  /* Vote panel inside expanded proposal */
  .vote-panel {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent) 6%, var(--bg-elev));
  }
  .vote-panel-title {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 2px;
  }
  .vote-panel-sub { font-size: 12.5px; color: var(--text-dim); }
  .vote-panel .vote-row { flex-shrink: 0; }
  @media (max-width: 640px) {
    .vote-panel { flex-direction: column; align-items: stretch; gap: 12px; }
    .vote-panel .vote-row { display: grid; grid-template-columns: repeat(3, 1fr); }
  }

  /* Signal-only placeholder */
  .actions-box.signal-only { background: var(--bg-elev); }
  .signal-inner {
    display: flex; gap: 12px; align-items: center;
    padding: 14px 16px;
    color: var(--text-dim);
  }
  .signal-inner > svg { flex-shrink: 0; color: var(--text-mute); }
  .signal-title { font-size: 13.5px; color: var(--text); font-weight: 500; margin-bottom: 1px; }
  .signal-sub { font-size: 12.5px; color: var(--text-dim); }

  /* Admin hints */
  .admin-hint {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--text-dim);
    padding: 6px 10px; border-radius: 6px;
    background: var(--bg-elev);
  }
  .admin-hint > svg { color: var(--text-mute); }

  .countdown {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .countdown b { color: var(--text); font-weight: 500; }

  .vote-row { display: flex; gap: 6px; }
  .vote-btn {
    padding: 0 12px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 500;
    background: var(--bg-elev-2);
    transition: border-color .15s, background .15s, color .15s;
  }
  .vote-btn:hover { border-color: var(--line-strong); }
  .vote-btn.for:hover, .vote-btn.for.voted { border-color: var(--success); color: var(--success); background: color-mix(in oklab, var(--success) 10%, var(--bg-elev-2)); }
  .vote-btn.against:hover, .vote-btn.against.voted { border-color: var(--error); color: var(--error); background: color-mix(in oklab, var(--error) 10%, var(--bg-elev-2)); }
  .vote-btn.abstain:hover, .vote-btn.abstain.voted { border-color: var(--line-strong); color: var(--text); }

  /* config grid */
  .cfg-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  @media (max-width: 880px) { .cfg-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .cfg-grid { grid-template-columns: 1fr; } }

  .cfg-cell {
    background: var(--bg-elev);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cfg-k {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .cfg-v {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .cfg-v small { font-size: 14px; color: var(--text-dim); font-family: var(--font-ui); letter-spacing: 0; margin-left: 4px; }
  .cfg-link {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
    padding-top: 4px;
    transition: color .15s;
  }
  .cfg-link:hover { color: var(--accent); }
  .cfg-link svg { width: 11px; height: 11px; }

  /* create DAO form */
  .create-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    padding: 28px;
  }
  .create-card h3 {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 400; letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .create-sub { color: var(--text-dim); margin-bottom: 20px; }
  .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 640px) { .field-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .input, .textarea {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    transition: border-color .15s;
  }
  .input:focus, .textarea:focus { outline: none; border-color: var(--accent); }
  .textarea { height: 100px; padding: 10px 12px; resize: vertical; line-height: 1.45; }
  .input.mono, .textarea.mono { font-family: var(--font-mono); font-size: 13px; }
  .input-suffix { position: relative; }
  .input-suffix .input { padding-right: 56px; }
  .input-suffix-label {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .create-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line);
    flex-wrap: wrap; gap: 12px;
  }
  .create-foot .hint { color: var(--text-mute); font-size: 13px; }

  /* ProposalBuilder */
  .builder { display: flex; flex-direction: column; gap: 18px; }
  .builder-section {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .builder-section-head { display: flex; flex-direction: column; gap: 4px; }
  .builder-section-head h4 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 18px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--text);
  }
  .builder-section-head .muted { color: var(--text-mute); font-size: 12.5px; }
  .builder-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .builder-actions { display: flex; justify-content: flex-end; }
  .builder-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg);
    flex-wrap: wrap; gap: 12px;
  }
  .builder-foot .muted { color: var(--text-mute); font-size: 12.5px; font-family: var(--font-mono); }

  /* templates */
  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }
  .template-card {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: flex-start;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .template-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .template-icon {
    width: 26px; height: 26px; border-radius: 6px;
    background: color-mix(in oklab, var(--accent) 18%, var(--bg-elev));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .template-name { font-size: 13.5px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .template-sub { font-size: 11.5px; color: var(--text-mute); line-height: 1.4; }

  /* --- Proposal wizard (pw-*) --- */
  .pw-shell { display: flex; flex-direction: column; gap: 0; }
  .pw-steps {
    display: flex; align-items: center; gap: 0;
    padding: 6px 8px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .pw-step {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    border-radius: 7px;
    font-size: 12.5px;
    color: var(--text-mute);
    background: transparent;
    transition: color .15s, background .15s;
  }
  .pw-step:hover:not(:disabled) { color: var(--text-dim); }
  .pw-step:disabled { cursor: not-allowed; opacity: .55; }
  .pw-step.done { color: var(--text-dim); }
  .pw-step.active { color: var(--text); background: var(--bg-elev-2); }
  .pw-step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--bg-elev); border: 1px solid var(--line);
    display: inline-grid; place-items: center;
    font-size: 10.5px; font-weight: 500; color: var(--text-mute);
    font-family: var(--font-mono);
  }
  .pw-step.active .pw-step-num { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .pw-step.done .pw-step-num { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 60%, var(--line)); }
  .pw-step-sep {
    width: 18px; height: 1px;
    background: var(--line);
    flex-shrink: 0;
  }
  .pw-step-sep.done { background: color-mix(in oklab, var(--accent) 55%, var(--line)); }

  .pw-kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10.5px; color: var(--text-mute);
  }
  .pw-h {
    margin: 0;
    font-family: var(--font-display);
    font-size: 22px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--text);
  }
  .pw-sub { color: var(--text-mute); font-size: 13px; margin: 4px 0 0; }

  /* Method picker — 3 large cards */
  .pw-methods {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 760px) { .pw-methods { grid-template-columns: 1fr; } }
  .pw-method {
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    padding: 18px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    transition: border-color .15s, background .15s, transform .12s;
    min-height: 180px;
  }
  .pw-method:hover {
    border-color: color-mix(in oklab, var(--accent) 55%, var(--line));
    transform: translateY(-2px);
    background: color-mix(in oklab, var(--accent) 4%, var(--bg));
  }
  .pw-method-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: color-mix(in oklab, var(--accent) 16%, var(--bg-elev));
    color: var(--accent);
    display: inline-grid; place-items: center;
  }
  .pw-method-k { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .pw-method-name {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--text);
  }
  .pw-method-sub { font-size: 12.5px; color: var(--text-dim); line-height: 1.45; text-wrap: pretty; }
  .pw-method-cta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--text-mute);
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em;
  }
  .pw-method:hover .pw-method-cta { color: var(--accent); }
  .pw-method:hover .pw-method-cta svg { transform: translateX(3px); }
  .pw-method-cta svg { transition: transform .15s; }

  /* Contract type grid (step 2 for "contract" path) */
  .pw-types {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 10px;
  }
  .pw-type {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: flex-start;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    transition: border-color .15s, background .15s;
    position: relative;
  }
  .pw-type:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .pw-type.on {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 7%, var(--bg-elev));
  }
  .pw-type-icon {
    width: 30px; height: 30px; border-radius: 7px;
    background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev));
    color: var(--accent);
    display: inline-grid; place-items: center;
    flex-shrink: 0;
  }
  .pw-type-k { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .pw-type-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .pw-type-sub { font-size: 11.5px; color: var(--text-mute); line-height: 1.4; }
  .pw-type-count {
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
  }
  .pw-type-count b { color: var(--text); font-weight: 500; }

  /* Toolbar above filter/list area */
  .pw-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev));
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
    border-radius: 10px;
  }
  .pw-toolbar-icon {
    width: 26px; height: 26px; border-radius: 6px;
    background: color-mix(in oklab, var(--accent) 22%, var(--bg-elev));
    color: var(--accent);
    display: inline-grid; place-items: center;
    flex-shrink: 0;
  }
  .pw-toolbar-k { display: flex; flex-direction: column; gap: 0; min-width: 0; }
  .pw-toolbar-k b { font-size: 13px; font-weight: 500; color: var(--text); }
  .pw-toolbar-k span { font-size: 11.5px; color: var(--text-mute); }
  .pw-toolbar-edit {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
    background: transparent;
    border: 1px solid var(--line);
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .pw-toolbar-edit:hover { color: var(--text); border-color: var(--line-strong); }

  /* Function picker — vertical list of cards */
  .pw-fns { display: flex; flex-direction: column; gap: 6px; }
  .pw-fn {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 9px;
    text-align: left;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .pw-fn:hover { border-color: var(--line-strong); }
  .pw-fn.on {
    border-color: var(--accent);
    background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev));
  }
  .pw-fn-l1 { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .pw-fn-l2 { font-size: 11.5px; color: var(--text-mute); font-family: var(--font-mono); margin-top: 2px; }
  .pw-fn-tag {
    align-self: center;
    font-family: var(--font-mono);
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-mute);
    padding: 2px 7px; border-radius: 4px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
  }
  .pw-fn.on .pw-fn-tag { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 40%, var(--line)); }

  /* Wizard footer */
  .pw-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px; margin-top: 16px;
    border-top: 1px solid var(--line);
    gap: 12px; flex-wrap: wrap;
  }
  .pw-foot-meta {
    font-size: 11.5px; color: var(--text-mute);
    font-family: var(--font-mono);
  }
  .pw-foot-actions { display: flex; gap: 8px; }

  /* Soft pill list for "what comes next" */
  .pw-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* Empty state inside a step */
  .pw-empty {
    display: flex; flex-direction: column; gap: 6px;
    align-items: center; justify-content: center;
    padding: 26px 18px;
    border: 1px dashed var(--line);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text-mute);
    text-align: center;
  }
  .pw-empty b { color: var(--text); font-weight: 500; font-size: 13.5px; }
  .pw-empty span { font-size: 12px; }

  /* "Browse address book" CTA card on step 2 (address mode) */
  .pw-pickbtn {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 16px 18px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 11px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .pw-pickbtn:hover {
    border-color: color-mix(in oklab, var(--accent) 55%, var(--line));
    background: color-mix(in oklab, var(--accent) 5%, var(--bg));
    transform: translateY(-1px);
  }
  .pw-pickbtn:hover > svg:last-child { transform: translateX(3px); color: var(--accent); }
  .pw-pickbtn > svg:last-child { color: var(--text-mute); transition: transform .15s, color .15s; flex-shrink: 0; }
  .pw-pickbtn-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: color-mix(in oklab, var(--accent) 16%, var(--bg-elev));
    color: var(--accent);
    display: inline-grid; place-items: center;
    flex-shrink: 0;
  }
  .pw-pickbtn-k { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .pw-pickbtn-name {
    font-family: var(--font-display);
    font-size: 15px; font-weight: 500; letter-spacing: -0.005em;
    color: var(--text);
  }
  .pw-pickbtn-sub { font-size: 12px; color: var(--text-mute); line-height: 1.45; }

  /* Target picker modal — tabbed sections */
  .tpm-body {
    display: flex; flex-direction: column;
    gap: 12px;
    padding: 16px 18px 8px;
    max-height: 64vh;
    overflow-y: auto;
  }
  .tpm-search { margin: 0; }

  /* Tab bar */
  .tpm-tabs {
    display: flex;
    gap: 2px;
    padding: 3px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 9px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tpm-tabs::-webkit-scrollbar { display: none; }
  .tpm-tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 11px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-mute);
    background: transparent;
    white-space: nowrap;
    transition: color .12s, background .12s;
    flex-shrink: 0;
  }
  .tpm-tab:hover { color: var(--text-dim); }
  .tpm-tab.on {
    color: var(--text);
    background: var(--bg-elev-2);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }
  .tpm-tab > svg { color: currentColor; flex-shrink: 0; }
  .tpm-tab-label { line-height: 1; }
  .tpm-tab-count {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
    padding: 1px 6px;
    background: var(--bg);
    border-radius: 4px;
  }
  .tpm-tab.on .tpm-tab-count { background: var(--bg-elev); color: var(--text-dim); }

  /* Pane below tabs */
  .tpm-pane {
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .tpm-pane-sub {
    font-size: 11.5px;
    color: var(--text-mute);
    padding: 0 2px;
  }

  .tpm-rows {
    display: flex; flex-direction: column;
    gap: 2px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 9px;
    background: color-mix(in oklab, var(--bg-elev) 50%, var(--bg));
    max-height: 320px;
    overflow-y: auto;
  }
  .tpm-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .tpm-row:hover {
    background: var(--bg-elev-2);
    border-color: var(--line);
  }
  .tpm-row:hover .tpm-row-acts { opacity: 1; }
  .tpm-row-k { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .tpm-row-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tpm-row-sub {
    font-size: 11px; color: var(--text-mute);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tpm-row-tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-mute);
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .tpm-row-acts {
    display: inline-flex; gap: 4px;
    opacity: .55;
    transition: opacity .12s;
    flex-shrink: 0;
  }
  .tpm-sec-empty {
    padding: 22px 16px;
    color: var(--text-mute);
    font-size: 12px;
    text-align: center;
  }

  /* Custom-address pane */
  .tpm-custom {
    display: flex; flex-direction: column; gap: 12px;
    padding: 14px;
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
    border-radius: 9px;
    background: color-mix(in oklab, var(--accent) 4%, var(--bg));
  }
  .tpm-custom-actions { display: flex; justify-content: flex-end; gap: 8px; }

  .tpm-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
  }

  /* params */
  .builder-params {
    border: 1px dashed var(--line);
    border-radius: 10px;
    padding: 14px;
    background: var(--bg);
    display: flex; flex-direction: column; gap: 10px;
  }
  .builder-params-head {
    font-size: 11.5px; color: var(--text-mute);
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
  }
  .param-type {
    color: var(--text-mute);
    font-size: 10.5px;
    margin-left: 4px;
    font-weight: 400;
  }

  /* address book input */
  .ab-wrap { position: relative; }
  .ab-input-wrap { display: flex; align-items: stretch; }
  .ab-input { flex: 1; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .ab-book-btn {
    width: 38px;
    border: 1px solid var(--line);
    border-left: 0;
    background: var(--bg-elev-2);
    color: var(--text-dim);
    border-top-right-radius: 8px; border-bottom-right-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .ab-book-btn:hover { color: var(--accent); border-color: var(--accent); }
  .ab-tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: color-mix(in oklab, var(--accent) 10%, var(--bg-elev));
    border: 1px solid color-mix(in oklab, var(--accent) 35%, var(--line));
    border-radius: 8px;
    color: var(--text);
    font-size: 13px; font-weight: 500;
    width: 100%;
    cursor: pointer;
  }
  .ab-tag:hover { background: color-mix(in oklab, var(--accent) 15%, var(--bg-elev)); }
  .ab-tag-name { color: var(--accent); font-weight: 600; }
  .ab-tag-addr { color: var(--text-mute); font-size: 12px; margin-left: auto; }

  .ab-pop {
    position: absolute; left: 0; right: 0; top: calc(100% + 6px);
    z-index: 50;
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(0,0,0,.25);
    padding: 6px;
    max-height: 320px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ab-search {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--line);
    color: var(--text-mute);
  }
  .ab-search input {
    flex: 1; background: transparent; border: 0; outline: none;
    color: var(--text); font-size: 13px;
  }
  .ab-clear {
    background: transparent; border: 0; color: var(--text-mute);
    font-size: 11.5px; cursor: pointer; padding: 2px 6px;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .ab-clear:hover { color: var(--text); }
  .ab-list { overflow-y: auto; }
  .ab-item {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    column-gap: 10px;
    padding: 8px 10px;
    background: transparent; border: 0; width: 100%;
    color: var(--text); text-align: left;
    border-radius: 6px;
    cursor: pointer;
  }
  .ab-item:hover { background: var(--bg-elev-2); }
  .ab-item-name { grid-column: 1; grid-row: 1; font-size: 13px; font-weight: 500; }
  .ab-item-role { grid-column: 1; grid-row: 2; font-size: 11px; color: var(--text-mute); }
  .ab-item-addr { grid-column: 2; grid-row: 1 / 3; align-self: center; color: var(--text-mute); font-size: 11.5px; }
  .ab-empty { padding: 12px; color: var(--text-mute); font-size: 12.5px; text-align: center; }

  /* staged calls */
  .staged-empty {
    display: flex; align-items: center; gap: 10px;
    padding: 18px;
    border: 1px dashed var(--line);
    border-radius: 10px;
    color: var(--text-mute);
    font-size: 13px;
    justify-content: center;
  }
  .staged-list { display: flex; flex-direction: column; gap: 8px; }
  .staged-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .staged-num {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--bg-elev-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: var(--text-mute);
  }
  .staged-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .staged-line-1 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 13.5px; }
  .staged-target { color: var(--accent); font-weight: 600; }
  .staged-fn { color: var(--text); }
  .staged-dot { color: var(--text-mute); }
  .staged-val { color: var(--text-dim); font-size: 12px; }
  .staged-line-2 { font-size: 11.5px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .staged-actions { display: flex; gap: 4px; }
  .icon-btn-sm {
    width: 26px; height: 26px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text-mute);
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .icon-btn-sm:hover:not(:disabled) { color: var(--text); border-color: var(--line-strong); }
  .icon-btn-sm.danger:hover { color: var(--error); border-color: color-mix(in oklab, var(--error) 35%, var(--line)); }
  .icon-btn-sm:disabled { opacity: .35; cursor: not-allowed; }

  .btn-sm { padding: 8px 14px; font-size: 13px; }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--line-strong); border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: inline-block;
  }
  .spinner.sm { width: 12px; height: 12px; border-width: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Segmented control */
  .seg {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .seg-btn {
    padding: 6px 12px;
    border: 0; background: transparent;
    color: var(--text-mute);
    font-size: 12.5px; font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    text-transform: capitalize;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active { background: var(--bg-elev-2); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  /* Wallets page */
  .ws-empty, .ws-loading {
    display: flex; align-items: center; gap: 14px;
    padding: 18px;
    border: 1px dashed var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
  }
  .ws-loading { justify-content: center; color: var(--text-mute); }
  .ws-empty-icon {
    width: 40px; height: 40px; border-radius: 8px;
    background: color-mix(in oklab, var(--accent) 18%, var(--bg-elev-2));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .ws-empty-k { flex: 1; }
  .ws-empty-k h4 { margin: 0; font-family: var(--font-display); font-size: 17px; font-weight: 500; }
  .ws-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
  }
  .ws-tabs { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .ws-tab {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
  }
  .ws-tab:hover { background: var(--bg-elev-2); color: var(--text); }
  .ws-tab.active { background: var(--bg); border-color: var(--line-strong); color: var(--text); }
  .ws-tab-deploy { color: var(--text-mute); border-style: dashed; gap: 6px; }
  .ws-tab-deploy:hover { color: var(--accent); border-color: var(--accent); }
  .ws-tab-deploy.active { color: var(--accent); border-color: var(--accent); border-style: solid; }
  .owner-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--bg-elev-2); }
  .dot-online { width: 7px; height: 7px; border-radius: 50%; background: oklch(72% .15 145); box-shadow: 0 0 0 3px color-mix(in oklab, oklch(72% .15 145) 22%, transparent); }
  .ws-kind {
    font-size: 9.5px; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: .08em;
    padding: 2px 6px; border-radius: 4px;
  }
  .ws-kind-basic { background: color-mix(in oklab, var(--accent) 12%, var(--bg-elev-2)); color: var(--accent); }
  .ws-kind-vault { background: color-mix(in oklab, oklch(60% .18 290) 14%, var(--bg-elev-2)); color: oklch(70% .15 290); }
  .ws-name { font-weight: 500; }
  .ws-addr { color: var(--text-mute); font-size: 11.5px; }

  /* Deploy widget */
  .deploy-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .deploy-card.hero { padding: 32px; align-items: stretch; }
  .deploy-card h4 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.005em; }
  .deploy-card .kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10.5px; color: var(--text-mute);
  }
  .deploy-card .small { font-size: 12.5px; }
  .deploy-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .deploy-fields { grid-template-columns: 1fr; } }
  .deploy-success {
    display: flex; align-items: center; gap: 14px;
    padding: 14px;
    background: color-mix(in oklab, var(--accent) 10%, var(--bg));
    border-radius: 10px;
  }
  .deploy-success-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: color-mix(in oklab, var(--accent) 22%, var(--bg-elev-2));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .deploy-addr { font-size: 12px; color: var(--text-mute); word-break: break-all; }

  /* Basic & vault wallet pages */
  .basic-wallet, .vault-wallet, .deploy-contract {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .bw-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
  }
  .bw-head h3 {
    margin: 4px 0 4px;
    font-family: var(--font-display);
    font-size: 24px; font-weight: 500; letter-spacing: -0.01em;
  }
  .bw-balances { display: flex; gap: 16px; flex-wrap: wrap; }
  .bw-bal { display: flex; flex-direction: column; gap: 2px; }
  .kicker {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10.5px; color: var(--text-mute);
  }
  .small { font-size: 12.5px; }

  .action-tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .action-tab {
    padding: 10px 14px;
    background: transparent; border: 0; border-bottom: 2px solid transparent;
    color: var(--text-mute);
    font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .action-tab:hover { color: var(--text); }
  .action-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .action-form, .vault-form, .contract-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .action-form .field.full, .vault-form .field.full, .contract-form .field.full { grid-column: 1 / -1; }
  .action-form .field, .vault-form .field, .contract-form .field { display: flex; flex-direction: column; gap: 6px; }
  @media (max-width: 600px) {
    .action-form, .vault-form, .contract-form { grid-template-columns: 1fr; }
  }
  .action-foot {
    grid-column: 1 / -1;
    display: flex; justify-content: flex-end; align-items: center; gap: 10px;
    padding-top: 4px;
  }
  .amount-row {
    display: flex; align-items: stretch;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg);
    overflow: hidden;
  }
  .amount-row:focus-within { border-color: var(--accent); }
  .amount-row .input {
    border: 0; border-radius: 0; flex: 1;
    background: transparent;
  }
  .amount-row .input:focus { box-shadow: none; outline: none; }
  .max-btn {
    padding: 0 14px;
    border: 0; border-left: 1px solid var(--line);
    background: var(--bg-elev-2);
    color: var(--accent);
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    cursor: pointer;
  }
  .max-btn:hover { background: var(--bg-elev); }
  .locked-field {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg);
    font-size: 13.5px;
    color: var(--text);
  }
  .locked-icon { color: var(--text-mute); display: inline-flex; }

  /* Vault */
  .vault-policy { padding: 8px 0; }
  .vault-log { display: flex; flex-direction: column; gap: 0; }
  .vault-log-row {
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .vault-log-row:last-child { border-bottom: 0; }
  .vault-log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .vault-log-dot.warn { background: var(--warn, oklch(75% .15 75)); }
  .vault-log-when { white-space: nowrap; }
  .vault-log-who { color: var(--text-mute); }

  /* Deploy contract result */
  .deploy-result {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px;
    border: 1px solid color-mix(in oklab, var(--accent) 35%, var(--line));
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent) 8%, var(--bg));
  }
  .deploy-result-k { display: flex; flex-direction: column; gap: 4px; }

  /* Currency selector */
  .ccy-wrap { position: relative; }
  .ccy-trigger {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
  }
  .ccy-trigger:hover:not(:disabled) { border-color: var(--line-strong); }
  .ccy-trigger:disabled { opacity: .55; cursor: not-allowed; }
  .ccy-sym { font-weight: 600; letter-spacing: -0.005em; }
  .ccy-name { color: var(--text-mute); font-size: 12.5px; }
  .ccy-bal { margin-left: auto; color: var(--text-dim); font-size: 12.5px; }
  .token-logo { display: inline-flex; flex-shrink: 0; }
  @media (max-width: 540px) { .ccy-name { display: none; } }

  /* ============================================================
     Token Select Modal (.tsm-*)
     ============================================================ */
  .tsm-body {
    display: flex; flex-direction: column;
    max-height: min(72vh, 640px);
  }

  /* Search */
  .tsm-search {
    display: flex; align-items: center; gap: 8px;
    margin: 16px 22px 12px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text-dim);
  }
  .tsm-search:focus-within {
    border-color: var(--line-strong);
    background: var(--bg-elev-2);
  }
  .tsm-search input {
    flex: 1; min-width: 0;
    background: transparent; border: 0; outline: 0;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
  }
  .tsm-search input::placeholder { color: var(--text-mute); }

  /* Tabs */
  .tsm-tabs {
    display: flex; align-items: center; gap: 4px;
    padding: 0 22px 10px;
    border-bottom: 1px solid var(--line);
  }
  .tsm-tab {
    background: transparent; border: 0;
    padding: 6px 10px;
    border-radius: 6px;
    color: var(--text-mute);
    font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tsm-tab:hover { color: var(--text); background: var(--bg-elev-2); }
  .tsm-tab.on { color: var(--text); background: var(--bg-elev-2); }
  .tsm-tab-count {
    font-family: var(--font-mono); font-size: 10.5px;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-dim);
  }
  .tsm-tab.on .tsm-tab-count {
    background: color-mix(in oklab, var(--accent) 16%, var(--bg));
    color: var(--accent);
  }
  .tsm-chain-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-mute);
    font-family: var(--font-mono);
  }

  /* List */
  .tsm-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 12px;
  }
  .tsm-row {
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .12s ease;
  }
  .tsm-row:hover { background: var(--bg-elev-2); }
  .tsm-row.picked {
    background: color-mix(in oklab, var(--accent) 9%, var(--bg-elev));
    box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .tsm-row.picked .tsm-row-sym { color: var(--accent); }
  .tsm-row-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .tsm-row-line1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .tsm-row-sym { font-weight: 600; font-size: 14px; letter-spacing: -0.005em; }
  .tsm-row-name { color: var(--text-mute); font-size: 12.5px; }
  .tsm-row-line2 { color: var(--text-dim); font-size: 11.5px; }
  .tsm-tag {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em;
    font-size: 9.5px; padding: 2px 6px; border-radius: 4px;
    background: color-mix(in oklab, var(--accent) 18%, var(--bg-elev-2));
    color: var(--accent);
  }
  .tsm-tag-native {
    background: color-mix(in oklab, var(--text) 10%, var(--bg-elev-2));
    color: var(--text-mute);
  }
  .tsm-row-right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    min-width: 0;
  }
  .tsm-row-bal {
    font-size: 13px; color: var(--text);
    white-space: nowrap; font-weight: 500;
  }
  .tsm-row-acts {
    display: flex; gap: 2px;
    opacity: 0; transition: opacity .12s ease;
  }
  .tsm-row:hover .tsm-row-acts,
  .tsm-row.picked .tsm-row-acts { opacity: 1; }
  .tsm-row-check {
    position: absolute;
    right: 12px; top: 12px;
    color: var(--accent);
  }
  .tsm-row.picked .tsm-row-bal { padding-right: 18px; }
  .tsm-row.picked .tsm-row-acts { padding-right: 18px; }

  .tsm-empty {
    padding: 36px 24px; text-align: center;
    color: var(--text-mute);
  }
  .tsm-empty-title { font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .tsm-empty-sub { font-size: 13px; }

  /* Add panel */
  .tsm-add-panel {
    margin: 0 16px 16px;
    padding: 14px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .tsm-add-head {
    display: flex; align-items: center; justify-content: space-between;
  }
  .tsm-add-title { font-weight: 500; font-size: 13.5px; }
  .tsm-add-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tsm-add-field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .tsm-add-field-wide { grid-column: 1 / -1; }
  .tsm-add-field label {
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .tsm-add-field .input { font-size: 13px; }
  .tsm-input-with-action { display: flex; gap: 6px; align-items: stretch; }
  .tsm-input-with-action .input { flex: 1; min-width: 0; }
  .tsm-input-with-action .btn-ghost { white-space: nowrap; flex-shrink: 0; }
  .tsm-add-hint { font-size: 11.5px; color: var(--text-mute); }
  .tsm-add-hint.err { color: var(--error); }
  .tsm-add-warn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: color-mix(in oklab, var(--warn, #b3770b) 14%, var(--bg));
    border: 1px solid color-mix(in oklab, var(--warn, #b3770b) 28%, var(--line));
    border-radius: 6px;
    font-size: 12px; color: var(--text-mute);
  }
  .tsm-add-warn svg { color: var(--warn, #b3770b); flex-shrink: 0; }
  .tsm-add-actions { display: flex; justify-content: flex-end; gap: 8px; }

  /* Footer */
  .tsm-foot {
    align-items: center;
    justify-content: space-between;
  }
  .tsm-foot-meta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--text-mute);
  }
  .tsm-foot-sep { color: var(--line-strong); }
  .tsm-foot-link {
    background: transparent; border: 0; padding: 0;
    color: var(--accent);
    font-size: 11.5px; cursor: pointer;
    font-family: inherit;
  }
  .tsm-foot-link:hover { text-decoration: underline; }

  @media (max-width: 540px) {
    .tsm-add-grid { grid-template-columns: 1fr; }
    .tsm-row { grid-template-columns: auto 1fr auto; }
    .tsm-row-name { display: none; }
  }

  @media (max-width: 640px) {
    .builder-section { padding: 16px; }
    .staged-card { grid-template-columns: auto 1fr; }
    .staged-actions { grid-column: 1 / -1; justify-content: flex-end; }
  }

  /* ============ Address book modal ============ */
  .abk-body {
    display: flex; flex-direction: column;
    max-height: min(72vh, 640px);
    min-height: 420px;
  }
  .abk-avatar {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    color: white;
    font-weight: 600;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 1px color-mix(in oklab, white 14%, transparent);
  }

  /* Category tabs row */
  .abk-cats {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 22px 12px;
    border-bottom: 1px solid var(--line);
  }
  .abk-cat {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--bg);
    color: var(--text-dim);
    font-size: 11.5px; font-family: inherit;
    cursor: pointer;
    transition: all .12s ease;
  }
  .abk-cat:hover { color: var(--text); border-color: var(--line-strong); }
  .abk-cat.on {
    color: var(--text);
    border-color: var(--line-strong);
    background: var(--bg-elev-2);
  }
  .abk-cat .tsm-tab-count { padding: 0 5px; }

  /* List */
  .abk-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 8px;
  }
  .abk-section { padding: 4px 0; }
  .abk-section-head {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-mute);
    padding: 12px 10px 6px;
    font-weight: 500;
  }
  .abk-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .1s ease;
  }
  .abk-row:hover { background: var(--bg-elev-2); }
  .abk-row.picked { background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev-2)); }
  .abk-check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--line-strong);
