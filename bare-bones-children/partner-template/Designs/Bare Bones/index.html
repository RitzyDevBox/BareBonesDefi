    display: inline-flex; align-items: center; justify-content: center;
    color: white;
    transition: all .12s ease;
    flex-shrink: 0;
  }
  .abk-check.on {
    background: var(--accent);
    border-color: var(--accent);
  }
  .abk-row[class*="picked"] .abk-check {
    border-color: var(--accent);
  }
  /* When multi mode, the avatar comes after the check; grid auto-handles */
  .abk-row > .abk-check + .abk-avatar { grid-column: 2; }
  .abk-row > .abk-check + .abk-avatar + .abk-row-main { grid-column: 3; }
  .abk-row > .abk-check ~ .abk-row-acts { grid-column: 4; }
  .abk-row:has(.abk-check) { grid-template-columns: auto auto 1fr auto; }

  .abk-row-main { min-width: 0; }
  .abk-row-line1 {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2px;
  }
  .abk-row-name {
    font-weight: 500;
    color: var(--text);
    font-size: 13.5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 100%;
  }
  .abk-row-line2 {
    font-size: 11.5px;
    color: var(--text-mute);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 2px;
  }
  .abk-row-addr {
    font-size: 10.5px;
    color: var(--text-mute);
    letter-spacing: 0.02em;
  }
  .abk-row-acts {
    display: flex; align-items: center; gap: 2px;
    opacity: 0;
    transition: opacity .12s ease;
  }
  .abk-row:hover .abk-row-acts,
  .abk-row.picked .abk-row-acts { opacity: 1; }
  .icon-btn-sm.danger:hover { color: var(--danger, #e95469); border-color: var(--danger, #e95469); }

  .abk-foot { padding: 12px 16px; border-top: 1px solid var(--line); }
  .abk-optional { color: var(--text-mute); font-weight: 400; font-size: 11px; }

  /* Tag (selected single + selected items in multi) */
  .abk-tag {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 4px 4px 6px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--bg-elev);
    max-width: 100%;
  }
  .abk-tag .abk-tag-name {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 160px;
  }
  .abk-tag .abk-tag-addr {
    font-size: 10.5px;
    color: var(--text-mute);
    padding-left: 4px;
    border-left: 1px solid var(--line);
  }
  .abk-tag-x {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: transparent;
    border: 0;
    color: var(--text-mute);
    cursor: pointer;
    transition: all .1s ease;
  }
  .abk-tag-x:hover {
    background: var(--bg-elev-2);
    color: var(--text);
  }

  .abk-tag-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  .ab-book-btn-after {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    cursor: pointer;
    flex-shrink: 0;
    transition: all .1s ease;
  }
  .ab-book-btn-after:hover { color: var(--accent); border-color: var(--accent); }

  /* Multi-select wrap */
  .abk-multi-wrap {
    display: flex; flex-direction: column; gap: 6px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    min-height: 44px;
  }
  .abk-multi-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center;
  }
  .abk-multi-add {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: transparent;
    border: 1px dashed var(--line-strong);
    border-radius: 999px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all .12s ease;
  }
  .abk-multi-add:hover {
    color: var(--accent);
    border-color: var(--accent);
    border-style: solid;
  }
  .abk-multi-clear {
    align-self: flex-end;
    background: transparent;
    border: 0;
    color: var(--text-mute);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
  }
  .abk-multi-clear:hover { color: var(--text); text-decoration: underline; }

  @media (max-width: 540px) {
    .abk-row-line2 { font-size: 11px; }
    .abk-row-acts { opacity: 1; }
  }

  /* modal */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 90;
    background: color-mix(in oklab, var(--bg) 70%, black);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade .15s ease;
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes pop { from { opacity: 0; transform: translateY(6px) scale(.99) } to { opacity: 1; transform: none } }
  .modal {
    width: 100%;
    max-width: 440px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow), 0 30px 60px -20px rgba(0,0,0,.6);
    overflow: hidden;
    animation: pop .18s ease;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
  }
  .modal-head h3 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
    margin: 0;
  }
  .modal-body { padding: 22px; }
  .modal-body.tight { padding: 18px 22px; }

  /* wallet modal */
  .wallet-hero {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 10px 0 18px;
  }
  .wallet-avatar-lg {
    width: 64px; height: 64px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    margin-bottom: 14px;
  }
  .wallet-addr-row {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
  }
  .copy-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
    border-radius: 6px;
    color: var(--text-dim);
    transition: color .15s, background .15s;
  }
  .copy-btn:hover { color: var(--text); background: var(--bg-elev-2); }
  .copy-btn svg { width: 13px; height: 13px; }

  .wallet-bal {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .wallet-bal-cell { padding: 14px 16px; background: var(--bg-elev); }
  .wallet-bal-k { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
  .wallet-bal-v { font-family: var(--font-display); font-size: 22px; }

  .wallet-actions {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  /* settings modal */
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .settings-row:last-child { border-bottom: 0; }
  .settings-row .sr-title { font-weight: 500; }
  .settings-row .sr-sub { color: var(--text-dim); font-size: 13px; }

  /* theme toggle */
  .theme-toggle {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    background: var(--bg);
    gap: 2px;
  }
  .theme-toggle button {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--text-dim);
    transition: background .15s, color .15s;
  }
  .theme-toggle button svg { width: 13px; height: 13px; }
  .theme-toggle button.on {
    background: var(--bg-elev-2);
    color: var(--text);
  }

  /* toggle (switch) */
  .switch {
    width: 36px; height: 20px; border-radius: 999px;
    background: var(--line-strong);
    position: relative;
    transition: background .18s;
  }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff;
    transition: transform .18s;
    box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(16px); }

  /* dropdown menu */
  .menu {
    position: absolute;
    min-width: 200px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow), 0 16px 32px -16px rgba(0,0,0,.5);
    padding: 6px;
    z-index: 60;
    animation: pop .14s ease;
  }
  .menu-section {
    padding: 6px 10px 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    width: 100%;
    border-radius: 6px;
    font-size: 13.5px;
    text-align: left;
    transition: background .12s;
  }
  .menu-item:hover { background: var(--bg-elev-2); }
  .menu-item .mi-sub { margin-left: auto; color: var(--text-mute); font-size: 11px; font-family: var(--font-mono); }
  .menu-item.checked { color: var(--text); }
  .menu-item .check { width: 14px; height: 14px; color: var(--accent); opacity: 0; }
  .menu-item.checked .check { opacity: 1; }
  .menu-sep { height: 1px; background: var(--line); margin: 4px 2px; }

  /* toasts */
  .toast-stack {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column-reverse;
    gap: 10px;
    z-index: 100;
    width: min(380px, calc(100vw - 32px));
    pointer-events: none;
  }
  @media (max-width: 640px) {
    .toast-stack { bottom: 16px; left: 16px; right: 16px; width: auto; }
  }
  .toast {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 14px 14px 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-left: 3px solid var(--tone, var(--text-mute));
    border-radius: 10px;
    box-shadow: 0 12px 24px -12px rgba(0,0,0,.4);
    pointer-events: auto;
    animation: toast-in .25s cubic-bezier(.2,.8,.2,1);
    position: relative;
    overflow: hidden;
  }
  .toast.leaving { animation: toast-out .2s ease forwards; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { to { opacity: 0; transform: translateX(20px); } }

  .toast-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--tone);
    background: color-mix(in oklab, var(--tone) 15%, transparent);
    flex: none;
    margin-top: 1px;
  }
  .toast-icon svg { width: 13px; height: 13px; }
  .toast-body .tt { font-weight: 500; font-size: 14px; }
  .toast-body .td { color: var(--text-dim); font-size: 13px; margin-top: 2px; text-wrap: pretty; }
  .toast-body .ta {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--tone);
    font-size: 13px; font-weight: 500;
  }
  .toast-body .ta:hover { text-decoration: underline; }
  .toast-close {
    color: var(--text-mute);
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
  }
  .toast-close:hover { color: var(--text); background: var(--bg-elev-2); }
  .toast-close svg { width: 12px; height: 12px; }
  .toast-progress {
    position: absolute; left: 0; bottom: 0; height: 2px;
    background: var(--tone);
    opacity: .5;
    transform-origin: left;
  }

  .toast.success { --tone: var(--success); }
  .toast.error { --tone: var(--error); }
  .toast.warning { --tone: var(--warn); }
  .toast.info { --tone: var(--info); }

  /* empty state */
  .empty {
    padding: 60px 24px;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 14px;
    color: var(--text-dim);
  }
  .empty h4 { font-family: var(--font-display); font-size: 24px; font-weight: 400; color: var(--text); margin: 0 0 6px; }

  /* ============================================================
     Payments page — payroll staging editor
     ============================================================ */
  .pay-hero { padding: 40px 0 28px; }
  .pay-hero-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    margin-bottom: 28px;
  }
  .pay-hero h1 { margin: 0; font-family: var(--font-display); font-size: clamp(36px, 5vw, 52px); font-weight: 400; letter-spacing: -0.01em; }
  .pay-hero .crumb { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px; }

  .pay-status {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    font-family: var(--font-mono);
    letter-spacing: .04em;
    text-transform: uppercase;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text-dim);
  }
  .pay-status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 3px color-mix(in oklab, currentColor 22%, transparent); }
  .pay-status-draft { color: var(--text-dim); }
  .pay-status-info  { color: var(--info); border-color: color-mix(in oklab, var(--info) 35%, var(--line)); background: color-mix(in oklab, var(--info) 8%, var(--bg-elev)); }
  .pay-status-warn  { color: var(--warn); border-color: color-mix(in oklab, var(--warn) 35%, var(--line)); background: color-mix(in oklab, var(--warn) 8%, var(--bg-elev)); }
  .pay-status-ok    { color: var(--success); border-color: color-mix(in oklab, var(--success) 35%, var(--line)); background: color-mix(in oklab, var(--success) 8%, var(--bg-elev)); }
  .pay-status-error { color: var(--error); border-color: color-mix(in oklab, var(--error) 35%, var(--line)); background: color-mix(in oklab, var(--error) 8%, var(--bg-elev)); }

  .pay-hero-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  @media (max-width: 880px) { .pay-hero-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .pay-hero-grid { grid-template-columns: 1fr; } }
  .pay-stat { background: var(--bg-elev); padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
  .pay-stat-k { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }
  .pay-stat-v { font-family: var(--font-display); font-size: 24px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; }
  .pay-stat-sub { font-size: 12px; color: var(--text-mute); }
  .pay-stat-actions { padding-top: 16px; }
  .pay-action-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .pay-action-row .btn-ghost.danger { color: var(--error); border-color: color-mix(in oklab, var(--error) 30%, var(--line)); }
  .pay-action-row button:disabled { opacity: .4; cursor: not-allowed; }

  /* warning banner */
  .pay-banner {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 16px;
    border: 1px solid color-mix(in oklab, var(--warn) 40%, var(--line));
    background: color-mix(in oklab, var(--warn) 9%, var(--bg-elev));
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 13.5px;
    color: var(--text);
  }
  .pay-banner > svg { color: var(--warn); margin-top: 2px; }
  .pay-banner b { color: var(--text); }
  .pay-banner-actions { display: flex; gap: 6px; }
  .pay-banner-act {
    margin-left: 10px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .pay-banner-act:hover { border-color: var(--line-strong); }
  .pay-banner-warn { border-color: color-mix(in oklab, var(--warn) 40%, var(--line)); background: color-mix(in oklab, var(--warn) 9%, var(--bg-elev)); }
  .pay-banner-ok   { border-color: color-mix(in oklab, var(--success) 40%, var(--line)); background: color-mix(in oklab, var(--success) 9%, var(--bg-elev)); }
  .pay-banner-ok > svg { color: var(--success); }

  /* toolbar */
  .pay-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .pay-toolbar-spacer { flex: 1; }
  .pay-search {
    display: flex; align-items: center; gap: 8px;
    flex: 1; min-width: 220px; max-width: 420px;
    padding: 0 12px;
    height: 36px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev);
    color: var(--text-mute);
  }
  .pay-search:focus-within { border-color: var(--accent); }
  .pay-search input {
    flex: 1; background: transparent; border: 0; outline: none;
    color: var(--text); font-size: 13.5px;
  }
  .pay-search-x {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; color: var(--text-mute);
  }
  .pay-search-x:hover { color: var(--text); background: var(--bg-elev-2); }

  /* ============================================================
     Staged table grid
     ============================================================ */
  .stg-table {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    overflow: hidden;
  }
  .stg-head, .stg-row {
    display: grid;
    grid-template-columns: 36px 2fr 1.4fr 2fr 1.2fr 110px;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
  }
  .stg-row-edit { grid-template-columns: 36px 2fr 1.4fr 2fr 1.2fr 200px; }
  .stg-head {
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--line);
    font-family: var(--font-mono);
    font-size: 10.5px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .12em;
    font-weight: 500;
  }
  .stg-row { border-bottom: 1px solid var(--line); transition: background .12s; }
  .stg-row:last-child { border-bottom: 0; }
  .stg-row:hover { background: color-mix(in oklab, var(--bg-elev-2) 50%, transparent); }
  .stg-cell { min-width: 0; }
  .stg-cell-expand { width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 6px; background: var(--bg); color: var(--text-mute); }
  .stg-cell-expand:hover { color: var(--text); border-color: var(--line-strong); }
  .stg-cell-expand .caret { transition: transform .15s; display: inline-flex; }
  .stg-cell-expand .caret.open { transform: rotate(180deg); }
  .stg-cell-actions { display: flex; gap: 4px; justify-content: flex-end; }
  .stg-cell-gross { text-align: right; font-size: 13px; }
  .stg-gross-preview { color: var(--info); font-weight: 500; }

  .stg-payee-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
  .stg-payee-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .stg-payee-role { margin-top: 2px; }

  .stg-empty { padding: 40px 24px; text-align: center; }

  /* row tints — the staging visual language */
  .stg-row-payee.stg-added { background: color-mix(in oklab, var(--success) 10%, var(--bg-elev)); }
  .stg-row-payee.stg-added:hover { background: color-mix(in oklab, var(--success) 14%, var(--bg-elev)); }
  .stg-row-payee.stg-deleted { background: color-mix(in oklab, var(--error) 8%, var(--bg-elev)); }
  .stg-row-payee.stg-deleted:hover { background: color-mix(in oklab, var(--error) 11%, var(--bg-elev)); }
  .stg-row-payee.stg-deleted .stg-strike-target { text-decoration: line-through; color: var(--text-mute); }
  .stg-row-payee.stg-edited { background: color-mix(in oklab, var(--warn) 8%, var(--bg-elev)); }
  .stg-row-payee.stg-edited:hover { background: color-mix(in oklab, var(--warn) 11%, var(--bg-elev)); }

  /* badges */
  .stg-badge {
    display: inline-flex; align-items: center;
    font-family: var(--font-mono);
    font-size: 9.5px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 2px 7px; border-radius: 4px;
  }
  .stg-add  { background: color-mix(in oklab, var(--success) 18%, var(--bg-elev-2)); color: var(--success); }
  .stg-edit { background: color-mix(in oklab, var(--warn) 18%, var(--bg-elev-2)); color: var(--warn); }
  .stg-del  { background: color-mix(in oklab, var(--error) 18%, var(--bg-elev-2)); color: var(--error); }
  .stg-prev { color: var(--text-mute); font-size: 11px; }

  /* earnings pills (collapsed in row) */
  .stg-earn-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .earn-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px 3px 4px;
    border: 1px solid var(--line);
    background: var(--bg);
    border-radius: 999px;
    font-size: 11.5px;
    color: var(--text-dim);
    max-width: 200px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .earn-pill-kind {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--bg-elev-2);
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-size: 9.5px;
    font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .earn-pill-hourly .earn-pill-kind { background: color-mix(in oklab, var(--info) 22%, var(--bg-elev-2)); color: var(--info); }
  .earn-pill-weekly .earn-pill-kind { background: color-mix(in oklab, var(--accent) 22%, var(--bg-elev-2)); color: var(--accent); }
  .earn-pill-custom .earn-pill-kind { background: color-mix(in oklab, var(--warn) 22%, var(--bg-elev-2)); color: var(--warn); }
  .earn-pill-more { background: var(--bg-elev-2); color: var(--text-mute); padding: 3px 8px; }
  .earn-pill.stg-deleted { text-decoration: line-through; opacity: .6; }
  .earn-pill.stg-added { border-color: color-mix(in oklab, var(--success) 35%, var(--line)); background: color-mix(in oklab, var(--success) 8%, var(--bg)); color: var(--success); }
  .earn-pill.stg-edited { border-color: color-mix(in oklab, var(--warn) 35%, var(--line)); background: color-mix(in oklab, var(--warn) 8%, var(--bg)); }

  /* expanded children panel */
  .stg-children {
    background: color-mix(in oklab, var(--bg) 60%, var(--bg-elev-2));
    padding: 14px 16px 14px 60px;
    display: flex; flex-direction: column; gap: 8px;
    border-bottom: 1px solid var(--line);
  }
  .stg-children-of-deleted { opacity: .55; }
  .stg-child-empty {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    border: 1px dashed var(--line);
    border-radius: 8px;
    color: var(--text-mute);
    font-size: 12.5px;
  }
  .stg-add-child {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border: 1px dashed var(--line);
    background: transparent;
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12.5px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .stg-add-child:hover { color: var(--accent); border-color: var(--accent); }

  /* earning card */
  .earn-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
  }
  .earn-card.stg-deleted { background: color-mix(in oklab, var(--error) 6%, var(--bg)); border-color: color-mix(in oklab, var(--error) 30%, var(--line)); }
  .earn-card.stg-deleted .stg-strike-target { text-decoration: line-through; color: var(--text-mute); }
  .earn-card.stg-added { background: color-mix(in oklab, var(--success) 8%, var(--bg)); border-color: color-mix(in oklab, var(--success) 35%, var(--line)); }
  .earn-card.stg-edited { background: color-mix(in oklab, var(--warn) 7%, var(--bg)); border-color: color-mix(in oklab, var(--warn) 35%, var(--line)); }

  .earn-kind {
    font-family: var(--font-mono);
    font-size: 9.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .12em;
    padding: 4px 8px;
    border-radius: 4px;
    background: var(--bg-elev-2);
    color: var(--text-mute);
  }
  .earn-kind-hourly { background: color-mix(in oklab, var(--info) 18%, var(--bg-elev-2)); color: var(--info); }
  .earn-kind-weekly { background: color-mix(in oklab, var(--accent) 18%, var(--bg-elev-2)); color: var(--accent); }
  .earn-kind-custom { background: color-mix(in oklab, var(--warn) 18%, var(--bg-elev-2)); color: var(--warn); }

  .earn-card-name { display: flex; align-items: center; gap: 8px; font-size: 13.5px; }
  .earn-card-meta { color: var(--text-dim); font-size: 11.5px; margin-top: 2px; }
  .cfg-state {
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em;
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    background: var(--bg-elev-2); color: var(--text-mute);
  }
  .cfg-state-system { background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev-2)); color: var(--accent); }
  .cfg-state-user { background: var(--bg-elev-2); color: var(--text-dim); }

  .earn-card-r { display: flex; align-items: center; gap: 12px; }
  .earn-card-gross { font-size: 13.5px; font-weight: 500; }
  .earn-card-actions { display: flex; gap: 4px; }

  /* footer (apply / clear) */
  .stg-footer {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    z-index: 70;
    display: flex; align-items: center; gap: 18px;
    padding: 12px 14px 12px 18px;
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    box-shadow: 0 16px 40px -16px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.04) inset;
    animation: pop .2s ease;
  }
  .stg-footer-info { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--text); }
  .stg-pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--warn) 22%, transparent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .stg-footer-actions { display: flex; gap: 6px; }

  /* small helpers */
  .input-sm { height: 34px; padding: 0 10px; font-size: 13px; }
  .modal-foot {
    display: flex; align-items: center; justify-content: flex-end; gap: 8px;
    padding: 14px 22px;
    border-top: 1px solid var(--line);
  }

  /* ============================================================
     Earnings modal
     ============================================================ */
  .earn-modal { max-width: 720px; }
  .earn-modal-body { padding: 20px 22px; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .earn-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .earn-modal-grid .field { display: flex; flex-direction: column; gap: 6px; }
  .earn-modal-grid .field.full { grid-column: 1 / -1; }
  .earn-modal-grid .field label {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .12em;
  }
  @media (max-width: 600px) { .earn-modal-grid { grid-template-columns: 1fr; } }

  .seg-lg { padding: 4px; gap: 4px; width: 100%; }
  .seg-btn-lg {
    flex: 1;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px 14px;
    gap: 2px;
    text-transform: none;
    display: flex;
  }
  .seg-btn-lg .seg-btn-label { font-size: 14px; font-weight: 500; color: inherit; }
  .seg-btn-lg .seg-btn-sub   { font-size: 11px; color: var(--text-mute); font-family: var(--font-mono); letter-spacing: .04em; }

  /* schedule grid */
  .sched-grid {
    display: grid;
    grid-template-columns: 32px repeat(24, 1fr);
    gap: 2px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    user-select: none;
  }
  .sched-corner { }
  .sched-hh, .sched-dh {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text-mute);
    display: inline-flex; align-items: center; justify-content: center;
    height: 16px;
  }
  .sched-dh { justify-content: flex-end; padding-right: 6px; height: 22px; }
  .sched-cell {
    height: 22px;
    border-radius: 3px;
    background: var(--bg-elev-2);
    border: 0;
    cursor: pointer;
    transition: background .08s;
  }
  .sched-cell:hover { background: var(--line-strong); }
  .sched-cell.on { background: var(--accent); }
  .sched-cell.on:hover { filter: brightness(1.1); }

  .earn-modal-preview {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev-2));
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
    border-radius: 10px;
  }
  .earn-modal-preview-v {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.01em;
    margin-top: 2px;
  }

  /* process modal */
  .proc-modal { max-width: 480px; }
  .proc-body { padding: 22px; display: flex; flex-direction: column; gap: 18px; }
  .proc-summary {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .proc-summary > div { background: var(--bg-elev); padding: 14px 16px; }
  .proc-total { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin-top: 2px; }

  .proc-steps { display: flex; flex-direction: column; gap: 6px; }
  .proc-step {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-dim);
    font-size: 13.5px;
  }
  .proc-step.active { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 8%, var(--bg)); color: var(--text); }
  .proc-step.done { color: var(--text); }
  .proc-step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-family: var(--font-mono);
    color: var(--text-mute);
  }
  .proc-step.active .proc-step-num { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .proc-step.done .proc-step-num { background: color-mix(in oklab, var(--success) 22%, var(--bg-elev-2)); border-color: color-mix(in oklab, var(--success) 40%, var(--line)); color: var(--success); }

  .proc-status { padding: 10px 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; }

  .input-sm.input { height: 34px; padding: 0 10px; }

  /* mobile nav */
  .nav-links-desktop { display: flex; }
  .nav-menu-btn { display: none; }
  @media (max-width: 720px) {
    .nav-links-desktop { display: none; }
    .nav-menu-btn { display: inline-flex; }
  }

  /* ============================================================
     Unified Context Pill — combined DAO / chain / wallet control
     ============================================================ */
  .ctx-pill {
    display: inline-flex; align-items: stretch;
    height: 36px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    padding: 0;
    transition: border-color .15s, background .15s;
    font-size: 13px; font-weight: 500;
    color: var(--text);
    max-width: 100%;
    min-width: 0;
  }
  .ctx-pill:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .ctx-pill.connect-only {
    background: var(--accent); color: var(--accent-ink); border-color: var(--accent);
    padding: 0 14px;
  }
  .ctx-pill.connect-only:hover { filter: brightness(0.95); }

  .ctx-seg {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 10px;
    min-width: 0;
  }
  .ctx-seg + .ctx-seg { border-left: 1px solid var(--line); }
  .ctx-seg-dao { padding-left: 6px; max-width: 180px; }
  .ctx-seg-chain { padding: 0 10px; }
  .ctx-seg-wallet { padding-right: 12px; max-width: 140px; }

  .ctx-dao-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .ctx-wallet-addr { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctx-chain-label { color: var(--text-dim); font-size: 12px; white-space: nowrap; }

  /* On narrower widths collapse labels, keep avatars */
  @media (max-width: 1024px) {
    .ctx-dao-name, .ctx-chain-label, .ctx-wallet-addr, .ctx-connect-label { display: none; }
    .ctx-seg-dao, .ctx-seg-chain, .ctx-seg-wallet { padding: 0 10px; }
    .ctx-seg-dao { padding-left: 8px; }
    .ctx-seg-wallet { padding-right: 10px; }
  }
  .ctx-pill .ctx-seg { flex-shrink: 1; min-width: 0; }
  .nav-right { min-width: 0; }
  .nav-inner > .nav-links-desktop { flex-shrink: 0; }

  /* Context sheet (single panel surfacing all three switchers) */
  .ctx-sheet {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 60;
    width: 340px;
    max-width: calc(100vw - 24px);
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    box-shadow: 0 18px 44px -12px rgba(0,0,0,.45);
    overflow: hidden;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 80px);
  }
  .ctx-sheet-section { display: flex; flex-direction: column; }
  .ctx-sheet-section + .ctx-sheet-section { border-top: 1px solid var(--line); }
  .ctx-sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px 6px;
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-mute); letter-spacing: .12em; text-transform: uppercase;
  }
  .ctx-sheet-head .ctx-sheet-act {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim);
    letter-spacing: .08em; cursor: pointer;
    background: transparent; border: 0; padding: 2px 4px;
  }
  .ctx-sheet-head .ctx-sheet-act:hover { color: var(--accent); }
  .ctx-sheet-list { display: flex; flex-direction: column; padding: 2px 6px 8px; max-height: 220px; overflow-y: auto; }
  .ctx-sheet-item {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 10px;
    background: transparent; border: 0;
    border-radius: 8px;
    color: var(--text); text-align: left;
    cursor: pointer; width: 100%;
  }
  .ctx-sheet-item:hover { background: var(--bg-elev-2); }
  .ctx-sheet-item.checked { background: color-mix(in oklab, var(--accent) 10%, var(--bg-elev)); }
  .ctx-sheet-item.checked .ctx-sheet-check { color: var(--accent); opacity: 1; }
  .ctx-sheet-check { color: var(--text-mute); opacity: 0; }
  .ctx-sheet-item-k { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ctx-sheet-item-name { font-size: 13.5px; font-weight: 500; }
  .ctx-sheet-item-sub { font-size: 11.5px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .ctx-sheet-create {
    display: flex; align-items: center; gap: 10px;
    margin: 0 6px 6px; padding: 8px 10px;
    border-radius: 8px;
    color: var(--text-dim);
    background: transparent;
    cursor: pointer; width: calc(100% - 12px);
    text-align: left;
  }
  .ctx-sheet-create:hover { background: var(--bg-elev-2); color: var(--text); }
  .ctx-sheet-create-icon {
    width: 26px; height: 26px; border-radius: 6px;
    background: color-mix(in oklab, var(--accent) 15%, var(--bg-elev-2));
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* Wallet section in sheet */
  .ctx-wallet-card {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: center;
    padding: 12px 14px;
  }
  .ctx-wallet-avatar-lg {
    width: 36px; height: 36px; border-radius: 10px;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    flex-shrink: 0;
  }
  .ctx-wallet-info { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ctx-wallet-info .addr { font-family: var(--font-mono); font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctx-wallet-info .label { font-size: 11.5px; color: var(--text-mute); }
  .ctx-wallet-actions { display: flex; gap: 4px; }

  .ctx-connect-cta {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
  }
  .ctx-connect-cta .ctx-wallet-avatar-lg { background: var(--bg-elev-2); display: inline-flex; align-items: center; justify-content: center; color: var(--text-mute); }
  .ctx-connect-cta .label { font-size: 11.5px; color: var(--text-mute); margin-bottom: 2px; }
  .ctx-connect-cta .title { font-size: 14px; font-weight: 500; }

  /* avatar stack for ultra-narrow / minimal mode */
  .ctx-stack {
    display: inline-flex; align-items: center;
    height: 36px;
    padding: 0 10px 0 6px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  .ctx-stack:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .ctx-stack-avs { display: inline-flex; align-items: center; }
  .ctx-stack-avs > * + * { margin-left: -6px; }
  .ctx-stack-chain {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--dot, #888);
    border: 2px solid var(--bg-elev);
    flex-shrink: 0;
  }
  .ctx-stack:hover .ctx-stack-chain { border-color: var(--bg-elev-2); }
  .ctx-stack-wallet {
    width: 22px; height: 22px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    border: 2px solid var(--bg-elev);
    flex-shrink: 0;
  }
  .ctx-stack:hover .ctx-stack-wallet { border-color: var(--bg-elev-2); }
  .ctx-stack-caret { color: var(--text-mute); margin-left: 8px; }

  /* Minimal mode: DAO prominent, single avatar account button */
  .acct-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    position: relative;
    padding: 0;
    cursor: pointer;
  }
  .acct-btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .acct-btn .acct-orb {
    width: 22px; height: 22px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
  }
  .acct-btn .acct-chain {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dot, #888);
    border: 2px solid var(--bg-elev);
  }
  .acct-btn:hover .acct-chain { border-color: var(--bg-elev-2); }

  /* hide stale split-mode controls when not active */
  .nav-right .nav-ctx-host { position: relative; }

  /* scroll */
  html { scroll-behavior: smooth; }

  /* ============================================================
     v2 Payments — Hero, Nav, Mini-stats, sub-pages
     ============================================================ */
  .pay-hero-sub { margin-top: 10px; max-width: 560px; font-size: 14.5px; line-height: 1.5; }
  .pay-hero-meta { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; text-align: right; line-height: 1.5; }
  .pay-hero-meta .text { color: var(--text); }
  .pay-hero-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 6px;
    min-width: 0;
  }
  .pay-hero-card-k { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }
  .pay-hero-card-v { font-family: var(--font-display); font-size: 24px; font-weight: 500; letter-spacing: -0.01em; display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .pay-status-lg { font-size: 12px !important; padding: 5px 10px !important; }

  .pay-section { padding: 28px 0 140px !important; }

  /* PayrollNavigation tabs */
  .pay-nav-wrap { padding: 0 0 4px; }
  .pn {
    display: flex; align-items: center; gap: 10px;
    padding: 6px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .pn-arrow {
    width: 32px; height: 32px;
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text-mute);
    cursor: pointer;
    transition: all .12s;
  }
  .pn-arrow:hover { color: var(--text); border-color: var(--line-strong); }
  .pn-tabs {
    flex: 1;
    display: flex;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .pn-tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 2px;
    padding: 8px 14px;
    background: transparent; border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    min-width: 0;
  }
  .pn-tab:hover { background: var(--bg-elev-2); }
  .pn-tab.active {
    background: var(--bg-elev);
    border-color: var(--line);
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .pn-tab-l { font-size: 13.5px; font-weight: 500; color: var(--text-dim); }
  .pn-tab-s { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .pn-tab.active .pn-tab-l { color: var(--text); }
  .pn-tab.active .pn-tab-s { color: var(--accent); }
  @media (max-width: 980px) {
    .pn-tab-s { display: none; }
    .pn-tab { flex-direction: row; align-items: center; padding: 10px 14px; }
  }
  .pn-select {
    display: none;
    flex: 1;
    height: 36px;
    padding: 0 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }
  .pn-admin {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 9px;
    background: color-mix(in oklab, var(--accent) 12%, var(--bg-elev-2));
    color: var(--accent);
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
    border-radius: 999px;
    font-size: 11px; font-family: var(--font-mono);
    letter-spacing: .06em; text-transform: uppercase;
    flex-shrink: 0;
  }
  @media (max-width: 760px) {
    .pn-tabs { display: none; }
    .pn-select { display: block; }
  }

  /* mini-stats above table */
  .pay-mini {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .pay-mini-stat { background: var(--bg-elev); padding: 14px 18px; display: flex; flex-direction: column; gap: 4px; }
  .pay-mini-k { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }
  .pay-mini-v { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
  .pay-mini-staged { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 13px; }
  .pay-mini-add { color: var(--success); }
  .pay-mini-edit { color: var(--warn); }
  .pay-mini-del { color: var(--error); }
  .pay-mini-admin { display: inline-flex; align-items: center; gap: 4px; color: var(--accent); font-size: 14px; }
  @media (max-width: 720px) { .pay-mini { grid-template-columns: 1fr 1fr; } }

  /* status badge inactive */
  .cfg-state { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 999px; letter-spacing: .06em; text-transform: uppercase; border: 1px solid var(--line); }
  .cfg-state-system { background: color-mix(in oklab, var(--info) 10%, var(--bg-elev-2)); color: var(--info); border-color: color-mix(in oklab, var(--info) 28%, var(--line)); }
  .cfg-state-user   { background: color-mix(in oklab, var(--accent) 10%, var(--bg-elev-2)); color: var(--accent); border-color: color-mix(in oklab, var(--accent) 28%, var(--line)); }
  .cfg-state-inactive { background: var(--bg-elev-2); color: var(--text-mute); }

  /* Pay Batches */
  .pb-bar {
    display: flex; align-items: flex-end; gap: 14px;
    padding: 16px 18px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .pb-bar-l { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 240px; }
  .pb-bar-r { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pb-bar-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }
  .pb-batch-sel { width: 100%; max-width: 520px; }
  .pb-create-in { width: 220px; }

  .pb-meta {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 2fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .pb-meta > div { background: var(--bg-elev); padding: 12px 16px; }
  .pb-meta-v { font-size: 14px; margin-top: 4px; }
  @media (max-width: 760px) { .pb-meta { grid-template-columns: 1fr 1fr; } .pb-meta-note { grid-column: 1 / -1; } }

  .pb-add-shelf {
    border: 1px dashed color-mix(in oklab, var(--accent) 30%, var(--line));
    background: color-mix(in oklab, var(--accent) 5%, var(--bg-elev));
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .pb-add-shelf-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .pb-cand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
  .pb-cand {
    text-align: left;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    transition: all .12s;
  }
  .pb-cand:hover { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 6%, var(--bg)); }
  .pb-cand-name { font-size: 13.5px; font-weight: 500; color: var(--text); }

  /* Earnings Catalog */
  .ec-bar {
    display: flex; align-items: flex-end; gap: 14px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .ec-bar-l { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 240px; max-width: 360px; }
  .ec-rule-sel { width: 100%; }
  .ec-section { margin-bottom: 32px; }
  .ec-section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .ec-section-head h3 { margin: 0; font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .ec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .ec-empty { padding: 22px; border: 1px dashed var(--line); border-radius: 12px; text-align: center; }
  .ec-card {
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 8px;
    transition: all .12s;
  }
  .ec-card:hover { border-color: var(--line-strong); }
  .ec-inactive { opacity: .58; }
  .ec-card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ec-card-rule {
    font-family: var(--font-mono);
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .ec-rule-hourly  { background: color-mix(in oklab, var(--info) 14%, var(--bg-elev-2)); color: var(--info); }
  .ec-rule-weekly  { background: color-mix(in oklab, var(--accent) 14%, var(--bg-elev-2)); color: var(--accent); }
  .ec-rule-oneTime { background: color-mix(in oklab, var(--warn) 14%, var(--bg-elev-2)); color: var(--warn); }
  .ec-rule-salary  { background: color-mix(in oklab, var(--success) 14%, var(--bg-elev-2)); color: var(--success); }
  .ec-card-name { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
  .ec-card-id { margin-top: -4px; }
  .ec-card-note { color: var(--text-dim); line-height: 1.45; font-size: 13px; }
  .ec-card-bot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 6px; padding-top: 10px; border-top: 1px solid var(--line); }
  .ec-card-actions { display: flex; gap: 4px; }
  .btn-xs {
    height: 26px; padding: 0 8px; font-size: 12px;
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    transition: all .12s;
  }
  .btn-ghost.btn-xs:hover { border-color: var(--line-strong); color: var(--text); }
  .btn-primary.btn-xs { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn-primary.btn-xs:hover { filter: brightness(1.05); }

  /* hourly bands editor */
  .ec-bands { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .ec-bands-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ec-bands-head label { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }
  .ec-band {
    display: grid;
    grid-template-columns: 32px 1fr 1fr 32px;
    align-items: end;
    gap: 8px;
    padding: 8px 0;
    border-top: 1px dashed var(--line);
  }
  .ec-band:first-of-type { border-top: 0; padding-top: 0; }
  .ec-band-i { font-family: var(--font-mono); font-size: 11px; color: var(--text-mute); padding-bottom: 8px; }
  .ec-band .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .ec-band .field label { font-size: 10.5px; font-family: var(--font-mono); color: var(--text-mute); text-transform: uppercase; letter-spacing: .1em; }
  .ec-onetime {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: color-mix(in oklab, var(--warn) 7%, var(--bg-elev-2));
    border: 1px solid color-mix(in oklab, var(--warn) 25%, var(--line));
    border-radius: 10px;
  }
  .ec-onetime > svg { color: var(--warn); margin-top: 1px; flex-shrink: 0; }
  .ec-active-toggle {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 14px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
    border-radius: 8px;
  }

  /* batch onboard sheet */
  .batch-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; display: block; margin-bottom: 6px; }
  .batch-textarea { font-family: var(--font-mono); font-size: 13px; line-height: 1.5; padding: 10px 12px; resize: vertical; min-height: 140px; }
  .batch-preview {
    margin-top: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .batch-preview-head { display: flex; justify-content: space-between; padding: 10px 14px; background: var(--bg-elev-2); border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .batch-preview-row {
    display: grid;
    grid-template-columns: 200px 1fr 1fr;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    gap: 10px;
    align-items: center;
    font-size: 13px;
  }
  .batch-preview-row:last-child { border-bottom: 0; }
  .field-hint { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); margin-top: 4px; letter-spacing: .04em; }

  /* Payrolls page */
  .pr-cycles {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }
  .pr-cycle {
    text-align: left;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all .12s;
    display: flex; flex-direction: column; gap: 4px;
  }
  .pr-cycle:hover { border-color: var(--line-strong); }
  .pr-cycle.active { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 6%, var(--bg-elev)); }
  .pr-cycle-top { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .pr-cycle-cycle { font-size: 13.5px; font-weight: 500; }

  .pr-status-card {
    display: grid;
    grid-template-columns: 1.3fr 1.3fr 1fr auto;
    gap: 24px;
    align-items: end;
    padding: 24px 26px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .pr-status-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
  }
  .pr-status-draft::before { background: var(--text-mute); }
  .pr-status-info::before  { background: var(--info); }
  .pr-status-warn::before  { background: var(--warn); }
  .pr-status-ok::before    { background: var(--success); }
  .pr-status-error::before { background: var(--error); }
  .pr-status-l, .pr-status-m, .pr-status-r { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .pr-status-cycle { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .pr-status-total { font-family: var(--font-display); font-size: 30px; font-weight: 500; letter-spacing: -0.01em; }
  .pr-status-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  @media (max-width: 880px) {
    .pr-status-card { grid-template-columns: 1fr 1fr; }
    .pr-status-actions { grid-column: 1 / -1; justify-content: flex-end; padding-top: 10px; border-top: 1px solid var(--line); margin-top: 6px; }
  }

  /* process modal additions */
  .proc-summary-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line);
    align-items: center;
    font-size: 13.5px;
  }
  .proc-summary-row:last-child { border-bottom: 0; }
  .proc-ack {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px;
    background: color-mix(in oklab, var(--warn) 7%, var(--bg-elev-2));
    border: 1px solid color-mix(in oklab, var(--warn) 28%, var(--line));
    border-radius: 8px;
    cursor: pointer;
    font-size: 13.5px;
    margin-top: 12px;
  }
  .proc-ack input { margin-top: 3px; }

  /* misc */
  .kicker { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .12em; }

  /* ============================================================
     Panel — bordered shell with attached toolbar header
     ============================================================ */
  .panel {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    overflow: hidden;
    margin-bottom: 18px;
  }
  .panel-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--line);
  }
  .panel-toolbar-l { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; flex: 1 1 auto; min-width: 0; }
  .panel-toolbar-r { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .panel-search { width: 280px; }
  .panel-table { border: 0 !important; border-radius: 0 !important; }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev-2);
  }
  .panel-head-r { display: flex; gap: 8px; align-items: center; }
  .panel-body { padding: 14px; }
  @media (max-width: 720px) {
    .panel-toolbar { flex-direction: column; align-items: stretch; }
    .panel-toolbar-r { flex-wrap: wrap; }
    .panel-search { width: 100%; }
  }

  /* ============================================================
     Payees table (flat employee table, no expand)
     ============================================================ */
  .payees-filter {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .payees-filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all .12s;
  }
  .payees-filter-chip:hover { border-color: var(--line-strong); color: var(--text); }
  .payees-filter-chip.active {
    background: color-mix(in oklab, var(--accent) 12%, var(--bg-elev));
    border-color: color-mix(in oklab, var(--accent) 38%, var(--line));
    color: var(--text);
  }
  .payees-filter-n {
    font-size: 11px; color: var(--text-mute);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 999px;
  }
  .payees-filter-chip.active .payees-filter-n {
    color: var(--accent);
    border-color: color-mix(in oklab, var(--accent) 30%, var(--line));
  }

  .payees-table {
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .payees-head, .payees-row, .payees-row-edit {
    display: grid;
    grid-template-columns: 2fr 1.4fr 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
  }
  .payees-head {
    background: var(--bg-elev-2);
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .12em;
    padding-top: 10px; padding-bottom: 10px;
  }
  .payees-row { transition: background .12s; }
  .payees-row:hover { background: color-mix(in oklab, var(--accent) 4%, var(--bg-elev)); }
  .payees-row:last-child { border-bottom: 0; }
  .payees-row.is-deleted { opacity: .55; }
  .payees-row-edit { background: color-mix(in oklab, var(--accent) 6%, var(--bg-elev-2)); }
  .payees-empty { padding: 32px; text-align: center; }

  .payees-cell { min-width: 0; }
  .payees-cell-name { display: flex; flex-direction: column; gap: 2px; }
  .payees-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .payees-name { font-size: 14.5px; font-weight: 500; color: var(--text); }
  .payees-role { line-height: 1.3; }
  .payees-cell-actions { display: flex; gap: 4px; justify-content: flex-end; }

  /* status pill (Active/On hold/Terminated) */
  .payee-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .payee-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .payee-status-active     { background: color-mix(in oklab, var(--success) 8%, var(--bg-elev-2));
                             border-color: color-mix(in oklab, var(--success) 25%, var(--line)); color: var(--text); }
  .payee-status-onhold     { background: color-mix(in oklab, var(--warn) 8%, var(--bg-elev-2));
                             border-color: color-mix(in oklab, var(--warn) 25%, var(--line)); color: var(--text); }
  .payee-status-terminated { background: var(--bg-elev-2); border-color: var(--line); color: var(--text-mute); }

  @media (max-width: 720px) {
    .payees-head { display: none; }
    .payees-row, .payees-row-edit {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 14px 16px;
    }
    .payees-cell-addr::before { content: 'Address · '; color: var(--text-mute); font-family: var(--font-mono); font-size: 10.5px; }
    .payees-cell-actions { justify-content: flex-start; }
  }

  /* ============================================================
     Payrolls list (active hoisted + historic table)
     ============================================================ */
  .prl-section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .prl-active { margin-bottom: 24px; }
  .prl-active-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

  }
  .prl-active-card {

    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px 14px;

    position: relative;
    overflow: hidden;

    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
  }
  .prl-tone-draft::before { background: var(--text-mute); }
  .prl-tone-info::before  { background: var(--info); }
  .prl-tone-warn::before  { background: var(--warn); }
  .prl-active-card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 24px -10px color-mix(in oklab, var(--accent) 60%, transparent);
  }
  .prl-active-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .prl-active-cycle { font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
  .prl-active-grid-meta {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .prl-active-v { font-family: var(--font-display); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; margin-top: 2px; }
  .prl-active-cta {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent); font-size: 13px; font-weight: 500;
    padding-top: 4px;
  }

  .prl-table {
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .prl-head, .prl-row {
    display: grid;
    grid-template-columns: 1.4fr 1.4fr 0.6fr 0.6fr 1fr 0.9fr 32px;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .prl-head {
    background: var(--bg-elev-2);
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .12em;
    padding-top: 10px; padding-bottom: 10px;
  }
  .prl-row {
    background: transparent;
    border-left: 0; border-right: 0;
    color: var(--text);
    cursor: pointer;
    transition: background .12s;
    width: 100%;
    font-family: inherit;
    font-size: 14px;
  }
  .prl-row:hover { background: color-mix(in oklab, var(--accent) 5%, var(--bg-elev)); }
  .prl-row:last-child { border-bottom: 0; }
  .prl-cell { min-width: 0; }
  .prl-cell-cycle-name { font-weight: 500; }
  .prl-cell-go { color: var(--text-mute); display: flex; justify-content: center; }
  .prl-empty { padding: 32px; text-align: center; }

  @media (max-width: 880px) {
    .prl-head { display: none; }
    .prl-row {
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 14px 16px;
    }
    .prl-cell-window, .prl-cell-payees, .prl-cell-batches, .prl-cell-gross, .prl-cell-status {
      grid-column: 1;
      font-size: 12.5px;
    }
    .prl-cell-window::before { content: 'Window · '; color: var(--text-mute); }
    .prl-cell-payees::before { content: 'Payees · '; color: var(--text-mute); }
    .prl-cell-batches::before { content: 'Batches · '; color: var(--text-mute); }
    .prl-cell-gross::before { content: 'Gross · '; color: var(--text-mute); }
    .prl-cell-go { grid-column: 2; grid-row: 1; }
  }

  .prl-detail-back {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px;
  }

  /* ============================================================
     Members module
     ============================================================ */
  .m-page { display: flex; flex-direction: column; gap: 18px; }

  .m-subnav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);

    display: inline-flex; align-items: center; gap: 8px;

  .m-status-btn {
    display: inline-flex; align-items: center; gap: 8px;

    background: transparent;

    border-radius: 6px;

  }

  .m-status-btn.on { background: var(--bg-elev-2); color: var(--text); }
  .m-status-count {

  .m-filter-right { display: flex; gap: 8px; align-items: center; }
  .m-select {
    height: 34px; padding: 0 28px 0 10px;
    background: var(--bg-elev) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='none' stroke='%23999' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round' d='M1 1l4 4 4-4'/></svg>") no-repeat right 10px center;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    appearance: none;
  }
  .m-search {
    display: inline-flex; align-items: center; gap: 8px;
    height: 34px; padding: 0 10px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text-mute);

  }
  .m-search:focus-within { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .m-search input {

    font-size: 13px; color: var(--text);
  }
  .m-search-clear {
    background: transparent; border: 0; cursor: pointer;
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--text-mute); letter-spacing: .08em; text-transform: uppercase;
  }
  .m-search-clear:hover { color: var(--text); }

  .m-table-wrap {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    overflow: hidden;
  }
  .m-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .m-table th {
    text-align: left;
    padding: 11px 16px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    white-space: nowrap;
  }
  .m-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .m-table tr:last-child td { border-bottom: 0; }
  .m-row { cursor: pointer; transition: background .12s; }
  .m-row:hover td { background: color-mix(in oklab, var(--bg-elev-2) 50%, transparent); }

  .m-cell-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .m-avatar {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: white; font-weight: 600;
    font-family: var(--font-display);
    flex-shrink: 0;
    line-height: 1;
  }
  .m-name { font-weight: 500; color: var(--text); }
  .m-sub { font-size: 11.5px; color: var(--text-mute); }

  .m-acct {
    display: inline-flex; align-items: center;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: .08em;
    border: 1px solid var(--line);
    background: var(--bg);
  }
  .m-acct-member { color: var(--accent); border-color: color-mix(in oklab, var(--accent) 35%, var(--line)); background: color-mix(in oklab, var(--accent) 8%, var(--bg-elev-2)); }
  .m-acct-investor { color: oklch(0.78 0.14 270); border-color: color-mix(in oklab, oklch(0.78 0.14 270) 35%, var(--line)); background: color-mix(in oklab, oklch(0.78 0.14 270) 8%, var(--bg-elev-2)); }
  .m-acct-contractor { color: oklch(0.82 0.14 78); border-color: color-mix(in oklab, oklch(0.82 0.14 78) 35%, var(--line)); background: color-mix(in oklab, oklch(0.82 0.14 78) 8%, var(--bg-elev-2)); }

  .m-role-chips { display: flex; gap: 4px; flex-wrap: wrap; }

    display: inline-flex; align-items: center;
    padding: 3px 8px;
    font-size: 11.5px;
    border-radius: 5px;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .m-chip-more { color: var(--text-mute); font-family: var(--font-mono); font-size: 10.5px; }

  .m-warn-tag {
    margin-left: 6px;
    font-size: 9.5px;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--warn);
    background: color-mix(in oklab, var(--warn) 14%, var(--bg-elev-2));

  .m-sbt-dot { display: inline-flex; align-items: center; gap: 6px; }

  .m-empty {
    padding: 32px 18px; text-align: center;
    color: var(--text-dim);
  }
  .m-empty h4 { margin: 0 0 4px; font-family: var(--font-display); font-size: 18px; font-weight: 500; color: var(--text); }
  .m-link {
    background: transparent; border: 0; padding: 0;
    color: var(--accent); cursor: pointer; text-decoration: underline;
    font: inherit;
  }

  /* ── Member Detail (Page 5) ───────────────────────────────────────── */
  .md-root { gap: 16px; }

  .md-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .md-actions { display: flex; gap: 6px; }
  .btn-ghost.danger { color: var(--error); }
  .btn-ghost.danger:hover { background: color-mix(in oklab, var(--error) 8%, transparent); }

  .md-header {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
  }
  .md-header-main {
    display: flex; gap: 18px; align-items: center;
    min-width: 0;
  }
  .md-name {
    margin: 4px 0 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .md-header-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .md-header-info {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .md-info-item {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .md-copy-btn {
    background: transparent; border: 0; padding: 2px 4px; cursor: pointer;
    color: var(--text-mute); border-radius: 4px;
    display: inline-flex; align-items: center;
  }
  .md-copy-btn:hover { background: var(--bg-elev-2); color: var(--accent); }

  .md-stats {
    display: flex; gap: 22px;
    padding-left: 24px;
    border-left: 1px solid var(--line);
  }
  .md-stat { text-align: center; min-width: 64px; }
  .md-stat-num {
    font-size: 22px;
    font-weight: 600;
    font-feature-settings: 'tnum';
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .md-stat-label {
    margin-top: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
  }

  .md-tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }
  .md-tab {
    background: transparent; border: 0;
    padding: 10px 14px;
    cursor: pointer;
    color: var(--text-mute);
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .15s;

  .md-tab:hover { color: var(--text-dim); }
  .md-tab.on {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .md-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .md-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .md-card-wide { grid-column: 1 / -1; }
  .md-card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .md-card-row {
    display: flex; align-items: center; gap: 8px;
  }
  .md-card-body {
    margin: 10px 0 0;
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.55;
    text-wrap: pretty;

    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 14px;

  .md-fact {
    margin-top: 4px;
    font-size: 13px;
    color: var(--text);
  }

  .md-role-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .md-role-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--bg);
    font-size: 12px;

  .md-role-chip-name { color: var(--text); }

    font-size: 12px;
    color: var(--text-dim);

    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 24px;

    gap: 16px;
    margin-bottom: 18px;

  .md-section-title {
    margin: 4px 0 6px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .md-section-desc {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-dim);

    line-height: 1.55;

    display: flex; flex-direction: column; gap: 10px;

    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;

    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 12px;
  }

  .md-wallet-card {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 20px;
    background: var(--bg);
  }
  .md-wallet-card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .md-wallet-kind-tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;

    line-height: 1.5;
    color: var(--text);

    display: flex; flex-direction: column;
    position: relative;

  .md-activity-dot {
    width: 22px; height: 22px;
    border-radius: 50%;

    border: 1px solid var(--line);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    flex-shrink: 0;
    z-index: 1;
    margin-top: 1px;

  .md-activity-line {
    flex: 1; min-width: 0;
  }
  .md-activity-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
  }
  .md-activity-meta {
    margin-top: 2px;
    font-size: 11px;
    color: var(--text-mute);
  }

  @media (max-width: 880px) {
    .md-header { grid-template-columns: 1fr; }
    .md-stats { padding-left: 0; border-left: 0; padding-top: 16px; border-top: 1px solid var(--line); }
    .md-grid { grid-template-columns: 1fr; }
    .md-fact-row { grid-template-columns: 1fr; }
