<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Quorum — DAO Governance</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --radius: 10px;
    --bg: #0c0c0d;
    --bg-elev: #141416;
    --bg-elev-2: #1a1a1d;
    --line: #24242a;
    --line-strong: #33333a;
    --text: #ededee;
    --text-dim: #a3a3aa;
    --text-mute: #6b6b74;
    --accent: oklch(0.78 0.14 148);
    --accent-ink: #0a1a0f;
    --accent-soft: oklch(0.32 0.06 148);
    --success: oklch(0.78 0.14 148);
    --warn: oklch(0.82 0.14 78);
    --error: oklch(0.70 0.17 25);
    --info: oklch(0.75 0.10 240);
    --font-ui: "Inter Tight", -apple-system, Segoe UI, sans-serif;
    --font-display: "Inter Tight", -apple-system, Segoe UI, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
    --display-weight: 600;
    --display-italic: normal;
    --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -12px rgba(0,0,0,.5);
    --density: 1;
  }
  html[data-theme="light"] {
    --bg: #f7f6f2;
    --bg-elev: #ffffff;
    --bg-elev-2: #f0efea;
    --line: #e4e2dc;
    --line-strong: #cfccc3;
    --text: #111112;
    --text-dim: #5a5a60;
    --text-mute: #8a8a92;
    --accent: oklch(0.62 0.14 148);
    --accent-ink: #ffffff;
    --accent-soft: oklch(0.92 0.05 148);
    --shadow: 0 1px 0 rgba(0,0,0,.02) inset, 0 6px 16px -10px rgba(20,20,30,.15);
  }

  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
  }
  /* Honeycomb canvas sits behind content via fixed + z:-1; body bg is transparent when it's active */
  body.has-bg { background: transparent; }

  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; border: 0; background: none; }
  a { color: inherit; text-decoration: none; }

  .mono { font-family: var(--font-mono); font-feature-settings: "zero"; }
  .serif { font-family: var(--font-display); font-weight: var(--display-weight); font-style: var(--display-italic); letter-spacing: -0.01em; }

  /* Headings use the display font + its configured weight/italic */
  .hero h1, .section-head h2, .gov-hero h1,
  .step-title, .prop-main h3, .cfg-v, .create-card h3,
  .modal-head h3, .stat-v, .wallet-bal-v, .empty h4 {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    font-style: var(--display-italic);
  }
  .hero h1 em, .section-head h2 em { font-style: italic; }

  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* --- layout --- */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }
  @media (max-width: 640px) { .container { padding: 0 16px; } }

  /* --- nav --- */
  .nav {
    position: sticky;
    top: 0;
    z-index: 40;
    backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--bg) 82%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 60px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: -0.01em;
    padding-right: 8px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    border: 1.5px solid var(--text);
    border-radius: 50%;
    position: relative;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .brand em { font-style: italic; color: var(--text-dim); font-weight: 400; }

  .nav-links {
    display: flex; gap: 4px;
    margin-left: 16px;
  }
  .nav-link {
    padding: 7px 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-radius: 8px;
    transition: color .15s, background .15s;
  }
  .nav-link:hover { color: var(--text); background: var(--bg-elev); }
  .nav-link.active { color: var(--text); background: var(--bg-elev); }

  .nav-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }

  /* icon button */
  .icon-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .icon-btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* chain selector */
  .chain-sel {
    display: inline-flex; align-items: center; gap: 8px;
    height: 36px;
    padding: 0 10px 0 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: border-color .15s, background .15s;
  }
  .chain-sel:hover { border-color: var(--line-strong); }
  .chain-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dot, var(--accent));
    box-shadow: 0 0 0 2px color-mix(in oklab, var(--dot, var(--accent)) 30%, transparent);
  }
  .chain-caret { opacity: .5; }
  .chain-sel .chain-label-full { display: inline; }
  .chain-sel .chain-label-short { display: none; }
  @media (max-width: 640px) {
    .chain-sel .chain-label-full { display: none; }
    .chain-sel .chain-label-short { display: inline; }
    .chain-sel { padding: 0 8px; }
  }

  /* wallet button */
  .wallet-btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 36px;
    padding: 0 12px 0 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    font-weight: 500;
    font-size: 13px;
    transition: border-color .15s, background .15s;
  }
  .wallet-btn:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }
  .wallet-btn.connect { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .wallet-btn.connect:hover { filter: brightness(0.95); }

  .wallet-avatar {
    width: 18px; height: 18px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    flex: none;
  }

  /* --- hero / landing --- */
  .hero {
    padding: 96px 0 72px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 64px;
    align-items: end;
  }
  @media (max-width: 880px) {
    .hero { padding: 56px 0 48px; }
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ""; width: 24px; height: 1px; background: var(--text-mute);
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(44px, 7vw, 88px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
  }
  .hero h1 em { color: var(--accent); font-style: italic; }
  .hero-sub {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 52ch;
    margin: 0 0 32px;
    text-wrap: pretty;
  }
  .hero-cta { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-primary, .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    height: 44px;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 14px; font-weight: 500;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-ink);
  }
  .btn-primary:hover { filter: brightness(0.95); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary.btn-sm, .btn-ghost.btn-sm { height: 36px; padding: 0 14px; font-size: 13px; font-weight: 500; }
  .btn-ghost {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--line-strong); background: var(--bg-elev-2); }

  .hero-stats {
    border-left: 1px solid var(--line);
    padding-left: 32px;
    display: grid;
    gap: 28px;
  }
  @media (max-width: 880px) {
    .hero-stats { border-left: 0; padding-left: 0; border-top: 1px solid var(--line); padding-top: 32px; }
  }
  .stat-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: baseline; }
  .stat-k { color: var(--text-dim); font-size: 13px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .08em; font-weight: 500; }
  .stat-v { font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }
  .stat-v small { font-size: 14px; color: var(--text-dim); font-family: var(--font-ui); letter-spacing: 0; margin-left: 4px; }

  /* how it works */
  .section { padding: 80px 0; border-bottom: 1px solid var(--line); }
  @media (max-width: 880px) { .section { padding: 56px 0; } }

  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 40px; flex-wrap: wrap; gap: 12px;
  }
  .section-head h2 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-head h2 em { color: var(--accent); font-style: italic; }
  .section-head .eyebrow { margin: 0; }

  .steps {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    background: var(--bg-elev);
  }
  .step {
    padding: 32px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .step:last-child { border-right: 0; }
  .step-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: .12em;
    margin-bottom: 32px;
  }
  .step-title {
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .step-body { color: var(--text-dim); font-size: 14.5px; text-wrap: pretty; }
  @media (max-width: 880px) {
    .steps { grid-template-columns: 1fr; }
    .step { border-right: 0; border-bottom: 1px solid var(--line); }
    .step:last-child { border-bottom: 0; }
  }

  /* governance page */
  .gov-hero { padding: 48px 0 32px; border-bottom: 1px solid var(--line); }
  .gov-hero-inner {
    display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  }
  @media (max-width: 640px) { .gov-hero-inner { grid-template-columns: 1fr; } }
  .gov-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 400; letter-spacing: -0.01em;
    margin: 0;
  }
  .gov-hero .crumb {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    letter-spacing: .12em; text-transform: uppercase; margin-bottom: 12px;
  }

  .tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    margin-left: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-elev);
  }

  /* proposal card */
  .prop {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    padding: 20px 24px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    transition: border-color .15s, transform .15s;
    margin-bottom: 10px;
  }
  .prop:hover { border-color: var(--line-strong); }
  @media (max-width: 740px) {
    .prop { grid-template-columns: 1fr; gap: 14px; padding: 18px; }
  }

  .prop-id {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-mute);
    padding-top: 3px;
    min-width: 52px;
  }
  .prop-main h3 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.005em;
    margin: 0 0 6px;
    line-height: 1.2;
  }
  .prop-meta {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-mute);
  }
  .prop-meta .dot { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: .5; }
  .prop-tallies {
    margin-top: 14px;
    display: grid; gap: 6px; max-width: 360px;
  }
  .tally-bar {
    height: 6px; border-radius: 999px; overflow: hidden;
    background: var(--bg-elev-2);
    display: flex;
  }
  .tally-seg { height: 100%; }
  .tally-seg.for { background: var(--success); }
  .tally-seg.against { background: var(--error); }
  .tally-seg.abstain { background: var(--text-mute); }
  .tally-legend {
    display: flex; gap: 16px;
    font-size: 12px; color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .tally-legend b { color: var(--text); font-weight: 500; }

  .prop-side {
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    min-width: 160px;
  }
  .prop-quickactions {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    justify-content: flex-end;
  }
  .quick-hint {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; color: var(--text-dim);
    padding: 5px 9px; border-radius: 6px;
    background: var(--bg-elev);
    font-family: var(--font-mono);
  }
  .quick-hint > svg { color: var(--text-mute); }
  @media (max-width: 740px) {
    .prop-side { align-items: flex-start; min-width: 0; flex-direction: row; flex-wrap: wrap; }
    .prop-quickactions { justify-content: flex-start; }
  }

  .status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    letter-spacing: .02em;
    text-transform: uppercase;
    border: 1px solid var(--line);
    background: var(--bg-elev-2);
    color: var(--text-dim);
  }
  .status::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .status.active { color: var(--success); }
  .status.pending { color: var(--warn); }
  .status.succeeded { color: var(--success); }
  .status.defeated { color: var(--error); }
  .status.executed { color: var(--info); }
  .status.vetoed { color: var(--error); }
  .status.locked { color: var(--warn); }

  /* expand affordance */
  .prop { padding: 0 !important; display: block; }
  .prop-summary {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    padding: 20px 24px;
    cursor: pointer;
    align-items: start;
  }
  .prop-summary:hover { background: color-mix(in oklab, var(--bg-elev-2) 40%, transparent); }
  @media (max-width: 740px) { .prop-summary { grid-template-columns: 1fr; gap: 14px; padding: 18px; } }
  .prop-expand {
    border-top: 1px solid var(--line);
    padding: 18px 24px 20px;
    display: flex; flex-direction: column; gap: 14px;
    animation: expand .2s ease;
  }
  @keyframes expand { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  @media (max-width: 740px) { .prop-expand { padding: 16px 18px; } }
  .prop-desc { margin: 0; color: var(--text-dim); font-size: 14.5px; text-wrap: pretty; }

  .chev-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev-2);
    color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chev-btn:hover { color: var(--text); border-color: var(--line-strong); }

  /* actions */
  .actions-box {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: color-mix(in oklab, var(--bg) 60%, var(--bg-elev-2));
    overflow: hidden;
  }
  .actions-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
  }
  .actions-title {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .actions-title .count {
    margin-left: 8px;
    font-size: 11px; color: var(--text); padding: 2px 7px;
    background: var(--bg-elev); border-radius: 4px;
  }
  .toggle-seg {
    display: inline-flex; border: 1px solid var(--line); border-radius: 7px; padding: 2px; gap: 2px;
    background: var(--bg-elev);
  }
  .toggle-seg button {
    padding: 4px 10px; font-size: 12px; font-weight: 500; color: var(--text-dim);
    border-radius: 5px;
  }
  .toggle-seg button.on { background: var(--bg-elev-2); color: var(--text); }

  .action-fmt {
    display: grid; grid-template-columns: auto 1fr; gap: 14px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
  }
  .action-fmt:last-child { border-bottom: 0; }
  .action-idx {
    width: 22px; height: 22px; border-radius: 4px;
    background: var(--bg-elev); color: var(--text-mute);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .action-call { font-size: 13.5px; line-height: 1.4; word-break: break-all; }
  .action-contract { color: var(--accent); }
  .action-dot, .action-parens, .action-comma { color: var(--text-mute); }
  .action-fn { color: var(--text); font-weight: 500; }
  .action-arg { color: var(--text); }
  .action-meta {
    margin-top: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-mute);
  }
  .action-meta .dot { width: 3px; height: 3px; background: currentColor; border-radius: 50%; opacity: .5; }

  .raw-table-wrap { overflow-x: auto; }
  .raw-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .raw-table th {
    text-align: left; font-weight: 500;
    color: var(--text-mute); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    padding: 10px 12px; border-bottom: 1px solid var(--line);
  }
  .raw-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--line);
    color: var(--text); vertical-align: middle;
    white-space: nowrap;
  }
  .raw-table td .copy-btn { vertical-align: middle; margin-left: 6px; }
  .raw-table tr:last-child td { border-bottom: 0; }
  .raw-table .dim { color: var(--text-mute); }
  @media (max-width: 640px) {
    .raw-table th, .raw-table td { padding: 8px 10px; font-size: 11.5px; }
  }

  /* Admin / lifecycle button row */
  .prop-admin {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    justify-content: flex-end;
    padding-top: 4px;
  }
  .prop-admin .admin-hint { margin-right: auto; }
  .btn-ghost.danger {
    color: var(--error);
    border-color: color-mix(in oklab, var(--error) 35%, var(--line));
    height: 36px; padding: 0 14px; font-size: 13px;
  }
  .btn-ghost.danger:hover { background: color-mix(in oklab, var(--error) 10%, var(--bg-elev-2)); }

  /* Vote panel inside expanded proposal */
  .vote-panel {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent) 6%, var(--bg-elev));
  }
  .vote-panel-title {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 2px;
  }
  .vote-panel-sub { font-size: 12.5px; color: var(--text-dim); }
  .vote-panel .vote-row { flex-shrink: 0; }
  @media (max-width: 640px) {
    .vote-panel { flex-direction: column; align-items: stretch; gap: 12px; }
    .vote-panel .vote-row { display: grid; grid-template-columns: repeat(3, 1fr); }
  }

  /* Signal-only placeholder */
  .actions-box.signal-only { background: var(--bg-elev); }
  .signal-inner {
    display: flex; gap: 12px; align-items: center;
    padding: 14px 16px;
    color: var(--text-dim);
  }
  .signal-inner > svg { flex-shrink: 0; color: var(--text-mute); }
  .signal-title { font-size: 13.5px; color: var(--text); font-weight: 500; margin-bottom: 1px; }
  .signal-sub { font-size: 12.5px; color: var(--text-dim); }

  /* Admin hints */
  .admin-hint {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--text-dim);
    padding: 6px 10px; border-radius: 6px;
    background: var(--bg-elev);
  }
  .admin-hint > svg { color: var(--text-mute); }

  .countdown {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
  }
  .countdown b { color: var(--text); font-weight: 500; }

  .vote-row { display: flex; gap: 6px; }
  .vote-btn {
    padding: 0 12px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 500;
    background: var(--bg-elev-2);
    transition: border-color .15s, background .15s, color .15s;
  }
  .vote-btn:hover { border-color: var(--line-strong); }
  .vote-btn.for:hover, .vote-btn.for.voted { border-color: var(--success); color: var(--success); background: color-mix(in oklab, var(--success) 10%, var(--bg-elev-2)); }
  .vote-btn.against:hover, .vote-btn.against.voted { border-color: var(--error); color: var(--error); background: color-mix(in oklab, var(--error) 10%, var(--bg-elev-2)); }
  .vote-btn.abstain:hover, .vote-btn.abstain.voted { border-color: var(--line-strong); color: var(--text); }

  /* config grid */
  .cfg-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  @media (max-width: 880px) { .cfg-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .cfg-grid { grid-template-columns: 1fr; } }

  .cfg-cell {
    background: var(--bg-elev);
    padding: 20px 22px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cfg-k {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .cfg-v {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .cfg-v small { font-size: 14px; color: var(--text-dim); font-family: var(--font-ui); letter-spacing: 0; margin-left: 4px; }
  .cfg-link {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-dim);
    display: inline-flex; align-items: center; gap: 6px;
    padding-top: 4px;
    transition: color .15s;
  }
  .cfg-link:hover { color: var(--accent); }
  .cfg-link svg { width: 11px; height: 11px; }

  /* create DAO form */
  .create-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--bg-elev);
    padding: 28px;
  }
  .create-card h3 {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 400; letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .create-sub { color: var(--text-dim); margin-bottom: 20px; }
  .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 640px) { .field-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .input, .textarea {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    transition: border-color .15s;
  }
  .input:focus, .textarea:focus { outline: none; border-color: var(--accent); }
  .textarea { height: 100px; padding: 10px 12px; resize: vertical; line-height: 1.45; }
  .input.mono, .textarea.mono { font-family: var(--font-mono); font-size: 13px; }
  .input-suffix { position: relative; }
  .input-suffix .input { padding-right: 56px; }
  .input-suffix-label {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 11px; color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .create-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line);
    flex-wrap: wrap; gap: 12px;
  }
  .create-foot .hint { color: var(--text-mute); font-size: 13px; }

  /* modal */
  .modal-scrim {
    position: fixed; inset: 0; z-index: 90;
    background: color-mix(in oklab, var(--bg) 70%, black);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade .15s ease;
  }
  @keyframes fade { from { opacity: 0 } to { opacity: 1 } }
  @keyframes pop { from { opacity: 0; transform: translateY(6px) scale(.99) } to { opacity: 1; transform: none } }
  .modal {
    width: 100%;
    max-width: 440px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow), 0 30px 60px -20px rgba(0,0,0,.6);
    overflow: hidden;
    animation: pop .18s ease;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
  }
  .modal-head h3 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
    margin: 0;
  }
  .modal-body { padding: 22px; }
  .modal-body.tight { padding: 18px 22px; }

  /* wallet modal */
  .wallet-hero {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 10px 0 18px;
  }
  .wallet-avatar-lg {
    width: 64px; height: 64px; border-radius: 50%;
    background: conic-gradient(from 210deg, #6b8cff, var(--accent), #ff8fb3, #6b8cff);
    margin-bottom: 14px;
  }
  .wallet-addr-row {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg);
  }
  .copy-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px;
    border-radius: 6px;
    color: var(--text-dim);
    transition: color .15s, background .15s;
  }
  .copy-btn:hover { color: var(--text); background: var(--bg-elev-2); }
  .copy-btn svg { width: 13px; height: 13px; }

  .wallet-bal {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .wallet-bal-cell { padding: 14px 16px; background: var(--bg-elev); }
  .wallet-bal-k { font-family: var(--font-mono); font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
  .wallet-bal-v { font-family: var(--font-display); font-size: 22px; }

  .wallet-actions {
    margin-top: 18px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  /* settings modal */
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .settings-row:last-child { border-bottom: 0; }
  .settings-row .sr-title { font-weight: 500; }
  .settings-row .sr-sub { color: var(--text-dim); font-size: 13px; }

  /* theme toggle */
  .theme-toggle {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    background: var(--bg);
    gap: 2px;
  }
  .theme-toggle button {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--text-dim);
    transition: background .15s, color .15s;
  }
  .theme-toggle button svg { width: 13px; height: 13px; }
  .theme-toggle button.on {
    background: var(--bg-elev-2);
    color: var(--text);
  }

  /* toggle (switch) */
  .switch {
    width: 36px; height: 20px; border-radius: 999px;
    background: var(--line-strong);
    position: relative;
    transition: background .18s;
  }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff;
    transition: transform .18s;
    box-shadow: 0 1px 2px rgba(0,0,0,.2);
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(16px); }

  /* dropdown menu */
  .menu {
    position: absolute;
    min-width: 200px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow), 0 16px 32px -16px rgba(0,0,0,.5);
    padding: 6px;
    z-index: 60;
    animation: pop .14s ease;
  }
  .menu-section {
    padding: 6px 10px 4px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    width: 100%;
    border-radius: 6px;
    font-size: 13.5px;
    text-align: left;
    transition: background .12s;
  }
  .menu-item:hover { background: var(--bg-elev-2); }
  .menu-item .mi-sub { margin-left: auto; color: var(--text-mute); font-size: 11px; font-family: var(--font-mono); }
  .menu-item.checked { color: var(--text); }
  .menu-item .check { width: 14px; height: 14px; color: var(--accent); opacity: 0; }
  .menu-item.checked .check { opacity: 1; }
  .menu-sep { height: 1px; background: var(--line); margin: 4px 2px; }

  /* toasts */
  .toast-stack {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column-reverse;
    gap: 10px;
    z-index: 100;
    width: min(380px, calc(100vw - 32px));
    pointer-events: none;
  }
  @media (max-width: 640px) {
    .toast-stack { bottom: 16px; left: 16px; right: 16px; width: auto; }
  }
  .toast {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 14px 14px 14px 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-left: 3px solid var(--tone, var(--text-mute));
    border-radius: 10px;
    box-shadow: 0 12px 24px -12px rgba(0,0,0,.4);
    pointer-events: auto;
    animation: toast-in .25s cubic-bezier(.2,.8,.2,1);
    position: relative;
    overflow: hidden;
  }
  .toast.leaving { animation: toast-out .2s ease forwards; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { to { opacity: 0; transform: translateX(20px); } }

  .toast-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--tone);
    background: color-mix(in oklab, var(--tone) 15%, transparent);
    flex: none;
    margin-top: 1px;
  }
  .toast-icon svg { width: 13px; height: 13px; }
  .toast-body .tt { font-weight: 500; font-size: 14px; }
  .toast-body .td { color: var(--text-dim); font-size: 13px; margin-top: 2px; text-wrap: pretty; }
  .toast-body .ta {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--tone);
    font-size: 13px; font-weight: 500;
  }
  .toast-body .ta:hover { text-decoration: underline; }
  .toast-close {
    color: var(--text-mute);
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px;
  }
  .toast-close:hover { color: var(--text); background: var(--bg-elev-2); }
  .toast-close svg { width: 12px; height: 12px; }
  .toast-progress {
    position: absolute; left: 0; bottom: 0; height: 2px;
    background: var(--tone);
    opacity: .5;
    transform-origin: left;
  }

  .toast.success { --tone: var(--success); }
  .toast.error { --tone: var(--error); }
  .toast.warning { --tone: var(--warn); }
  .toast.info { --tone: var(--info); }

  /* empty state */
  .empty {
    padding: 60px 24px;
    text-align: center;
    border: 1px dashed var(--line);
    border-radius: 14px;
    color: var(--text-dim);
  }
  .empty h4 { font-family: var(--font-display); font-size: 24px; font-weight: 400; color: var(--text); margin: 0 0 6px; }

  /* mobile nav */
  .nav-links-desktop { display: flex; }
  .nav-menu-btn { display: none; }
  @media (max-width: 720px) {
    .nav-links-desktop { display: none; }
    .nav-menu-btn { display: inline-flex; }
  }

  /* scroll */
  html { scroll-behavior: smooth; }
</style>

<!-- Speaker-ish app metadata kept simple -->
